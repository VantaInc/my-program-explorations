<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BU Data Explorer — Meridian</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-up { animation: fadeUp 0.18s ease forwards; }
    input::placeholder { color: #C0BDB8; }
    input:focus { outline: none; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useRef, useEffect, useCallback } = React;

  // ── BU from URL ────────────────────────────────────────────────────────────
  const BU_ID = new URLSearchParams(location.search).get('bu') || 'forge';

  // ── BU metadata ────────────────────────────────────────────────────────────
  const BU_META = {
    forge: {
      name: 'Forge', sub: 'Dev Tools · SOC 2 Type II', color: '#059669',
      score: 91, delta: +3, status: 'On track', sColor: '#059669', sBg: '#D1FAE5',
      summary: 'Evidence at 89% — 12 days to audit window.',
      insights: [
        { icon: '✓', c: '#059669', bg: '#D1FAE5', text: 'All 5 control domains above 80% — Access Mgmt leading at 94%' },
        { icon: '!', c: '#D97706', bg: '#FEF3C7', text: '3 items remain: vendor logs, data retention export, auditor intro call' },
        { icon: '↗', c: '#5B21B6', bg: '#EDE9FE', text: 'Score up 3 pts this month — strongest velocity across all BUs' },
        { icon: '→', c: '#6B7280', bg: '#F3F4F6', text: 'SOC 2 Type II renewal due Sep 2025 — evidence window opens Aug 1' },
      ],
      chips: ['What are the 3 remaining items?', 'Show audit timeline', 'How does Forge compare to last quarter?', 'What's the biggest risk to the audit?'],
      answers: {
        'What are the 3 remaining items?': `The 3 open items before evidence freeze are:\n\n1. **Vendor activity logs (VM-04)** — Denise needs to export the last 90 days from your SIEM and attach to the control. ~15 min.\n\n2. **Data retention export (DP-07, DP-08)** — the Q1 report template is pre-filled, just needs to be run and uploaded. ~30 min.\n\n3. **Auditor intro call** — 30-min intro with the audit team. The calendar link is in your inbox from May 2. Needs to be booked before May 16.\n\nAt this pace you'll be fully ready by May 14 — 4 days before the window opens.`,
        'Show audit timeline': `Here's the Forge audit timeline:\n\n**May 6** — Today. Evidence at 89%, 3 items open.\n**May 14** — Projected evidence freeze (if current pace holds).\n**May 16** — Auditor intro call must be booked by this date.\n**May 18** — Audit window opens.\n**Jun 15** — Estimated audit completion.\n\nYou're on track. The only risk is the auditor intro call — it's unassigned and the deadline is 10 days out.`,
        'How does Forge compare to last quarter?': `Forge is up 3 pts vs. last quarter (88 → 91). The improvement came from:\n\n- Access Management jumped from 87% to 94% after the role matrix was updated\n- Incident Response hit 100% — all controls passing and evidence current\n- Data Protection improved from 72% to 80% after the DP-07 upload\n\nThe only area that slipped was Vendor Risk (94% → 91%) due to the Snowflake BAA still being unsigned, but it's not blocking the audit.`,
        'What\'s the biggest risk to the audit?': `The biggest remaining risk is the **auditor intro call** — it's unbooked and unassigned with 10 days left. It's not a control gap, but auditors sometimes flag lack of proactive engagement as a process concern.\n\nSecondary risk: the data retention export (DP-07, DP-08). If Denise gets pulled onto other work, this could slip. I'd recommend assigning it today with a due date of May 12.`,
      },
    },
    atlas: {
      name: 'Atlas', sub: 'Project Mgmt · ISO 27001', color: '#D97706',
      score: 84, delta: -2, status: 'Needs attention', sColor: '#D97706', sBg: '#FEF3C7',
      summary: 'Vendor deadline at risk — 2 ISO controls blocked.',
      insights: [
        { icon: '✕', c: '#DC2626', bg: '#FEE2E2', text: 'Okta questionnaire 60% complete — 3 days to May 9 deadline' },
        { icon: '!', c: '#D97706', bg: '#FEF3C7', text: 'ISO 27001 controls VM-04 and AC-06 blocked until cleared' },
        { icon: '!', c: '#D97706', bg: '#FEF3C7', text: 'Change Management policy needs sign-off from Marcus' },
        { icon: '↘', c: '#DC2626', bg: '#FEE2E2', text: 'Score fell 2 pts this month — Vendor Risk domain at 60%' },
      ],
      chips: ['Draft remaining Okta answers', 'Which controls unblock first?', 'What happens if we miss May 9?', 'Why is Vendor Risk at 60%?'],
      answers: {
        'Draft remaining Okta answers': `I've reviewed the 40% that's outstanding. Most of the remaining 14 questions cover Okta's encryption, incident response, and sub-processor policies — all publicly documented in their security whitepaper.\n\nHere are drafts for the 3 highest-priority questions:\n\n**Q: Does Okta encrypt data at rest?**\nYes. Okta uses AES-256 encryption for all data at rest across its cloud infrastructure, including customer data, credentials, and logs.\n\n**Q: What is Okta's incident response SLA?**\nOkta commits to notifying affected customers within 72 hours of a confirmed security incident under their Security Incident Response Policy (v4.2, Mar 2024).\n\n**Q: Who are Okta's sub-processors?**\nOkta's current sub-processor list is published at trust.okta.com/sub-processors and updated quarterly. Key sub-processors include AWS (infrastructure), Salesforce (CRM), and Zendesk (support).\n\nWant me to draft the remaining 11?`,
        'Which controls unblock first?': `Once the Okta questionnaire is submitted and marked complete:\n\n**VM-04 (Vendor Risk Assessment)** unblocks immediately — it's waiting on the questionnaire as the primary evidence artifact.\n\n**AC-06 (Third-party Access)** unblocks within 24 hours after VM-04 closes, since it depends on the vendor risk assessment being current.\n\nBoth should go green within 1-2 business days of submission. That would bring Atlas from 84 to approximately 87.`,
        'What happens if we miss May 9?': `If the Okta questionnaire misses the May 9 deadline:\n\n1. VM-04 and AC-06 remain failing — both will appear as open gaps in any ISO 27001 audit evidence review.\n\n2. Atlas's score likely drops 2-3 additional points, putting it below 82.\n\n3. The vendor relationship goes into a non-compliant state in Vanta, which may trigger additional review workflows.\n\nThe questionnaire is 60% done. At the current pace, Denise needs ~3 hours to complete the remaining sections. I'd prioritize this today.`,
        'Why is Vendor Risk at 60%?': `Atlas's Vendor Risk domain is at 60% (6 of 10 controls passing) because of two clusters of failures:\n\n**Okta questionnaire gap (VM-04, VM-05, VM-06)** — 3 controls blocked because the annual vendor questionnaire hasn't been completed.\n\n**Snowflake BAA gap (VM-07)** — the Business Associate Agreement for Snowflake is unsigned. PII is in scope, so this is a hard requirement.\n\nThe other 6 controls are passing. Completing the Okta questionnaire alone would bring Vendor Risk from 60% to 90%.`,
      },
    },
    orbit: {
      name: 'Orbit', sub: 'Cloud Storage · SOC 2 + ISO 27001', color: '#DC2626',
      score: 71, delta: -4, status: 'At risk', sColor: '#DC2626', sBg: '#FEE2E2',
      summary: '12 stale accounts active — IdP sync failed 47 days ago.',
      insights: [
        { icon: '✕', c: '#DC2626', bg: '#FEE2E2', text: '12 former employee accounts still have active credentials' },
        { icon: '✕', c: '#DC2626', bg: '#FEE2E2', text: 'Access Management at 55% — 5 of 11 controls failing' },
        { icon: '↘', c: '#DC2626', bg: '#FEE2E2', text: 'Score fell 4 pts since April 21 IdP sync failure' },
        { icon: '!', c: '#D97706', bg: '#FEF3C7', text: 'AC-2 failing — may require auditor disclosure at May 18 window' },
      ],
      chips: ['How do I fix the IdP sync?', 'Which accounts need immediate revocation?', 'How long to recover the score?', 'What\'s the audit disclosure risk?'],
      answers: {
        'How do I fix the IdP sync?': `The Okta IdP integration needs to be re-authenticated. Here's the exact fix:\n\n1. **Go to Vanta → Integrations → Okta**\n2. Click "Re-authenticate" and log in with your Okta admin credentials\n3. Verify the sync runs — it should complete within 15 minutes\n4. Confirm in Vanta that the 12 stale accounts now show as deprovisioned\n\n**Root cause:** The Okta admin token expired on March 20 and was never rotated. This is also why the sync has been failing silently for 47 days — Vanta sent 3 email alerts (Mar 21, Apr 3, Apr 17) that appear to have been missed.\n\nAfter the sync runs, AC-2, AC-3, AC-6, AC-9, and AC-10 should auto-remediate within 24 hours.`,
        'Which accounts need immediate revocation?': `All 12 accounts should be revoked immediately — they all map to former employees with no legitimate access need. Here are the highest-risk ones:\n\n**Highest priority (had admin access):**\n- j.chen@orbit.com — departed Feb 3, had S3 bucket admin rights\n- m.ross@orbit.com — departed Jan 15, had IAM policy write access\n\n**Standard priority (read/write access):**\n- 10 additional former employees with standard cloud storage access\n\nI can generate a full revocation list from the IdP sync log. Want me to draft a remediation ticket for your IT admin?`,
        'How long to recover the score?': `Here's the projected recovery timeline:\n\n**Day 1-2** — Reconnect Okta IdP sync → 5 AC controls auto-remediate → Score jumps from 71 to ~78\n\n**Day 3-5** — Revoke all 12 stale accounts, document remediation → AC-2 moves from failing to passing → Score reaches ~82\n\n**Day 7-10** — Complete access review, update evidence → Remaining open items clear → Score stabilizes at ~84-86\n\nAt 84+, Orbit is above the "Needs attention" threshold and the audit disclosure risk drops significantly. Full recovery to 90+ would take 3-4 weeks of sustained remediation.`,
        'What\'s the audit disclosure risk?': `The risk depends on timing. Here's the breakdown:\n\n**If fixed before May 18 (audit window opens):** Low risk. Auditors will see the remediation record and treat it as a process improvement. You'd need a short remediation note explaining what happened and when it was fixed.\n\n**If not fixed by May 18:** AC-2 (Account Management) will be a hard finding. SOC 2 requires active management of user accounts — 12 stale accounts from former employees is a material control failure. Auditors are likely to flag it in the report.\n\n**Bottom line:** You have 12 days. The fix takes about 2 hours. I'd treat this as the highest priority item across all three BUs today.`,
      },
    },
  };

  // ── Time series (same generation logic as data-explorer) ──────────────────
  const TODAY_DATE = new Date(2025, 4, 6);
  const SERIES = (() => {
    const out = [], start = new Date(2024, 2, 2), fxEnd = new Date(2025, 7, 3);
    let d = new Date(start);
    while (d <= fxEnd) {
      const t = (d - start) / 86400000, isFx = d > TODAY_DATE, isToday = d.toDateString() === TODAY_DATE.toDateString();
      const trend = 70 + 24 * (1 - Math.exp(-t / 230)) + (isFx ? (t - 430) * 0.04 : 0);
      const noise = Math.sin(t * 0.21) * 1.7 + Math.sin(t * 0.08) * 1.3 + Math.cos(t * 0.43) * 0.8;
      const score = Math.round(Math.max(64, Math.min(97, trend + noise)));
      out.push({
        date: new Date(d), score, isForecast: isFx, isToday,
        forge: Math.round(Math.min(99, score + 2 + Math.sin(t * 0.19) * 1.3)),
        atlas: Math.round(Math.max(60, score - 7 + Math.sin(t * 0.13) * 2.2)),
        orbit: Math.round(Math.max(55, score - 20 + Math.sin(t * 0.17) * 2.9)),
      });
      d = new Date(d); d.setDate(d.getDate() + 1);
    }
    return out;
  })();
  const TODAY_IDX = SERIES.findIndex(d => d.isToday);
  const WIN_DAYS = { '1W': 7, '1M': 30, '3M': 90, '1Y': 365 };

  function fmtDate(date, ws) {
    return ws === '1Y'
      ? date.toLocaleDateString('en-US', { month: 'short', year: '2-digit' })
      : date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function getSlice(ws, wo) {
    const size = WIN_DAYS[ws];
    if (wo < 0) return SERIES.slice(TODAY_IDX, Math.min(SERIES.length - 1, TODAY_IDX + size - 1) + 1);
    const end = Math.min(SERIES.length - 1, TODAY_IDX - wo * size);
    return SERIES.slice(Math.max(0, end - size + 1), end + 1);
  }

  // ── Key events ────────────────────────────────────────────────────────────
  const ALL_EVENTS = [
    { date: new Date(2024, 5, 3),  label: 'ISO gap',      bu: 'atlas', detail: 'Critical gap in Atlas ISO 27001 controls found during quarterly review.' },
    { date: new Date(2024, 8, 9),  label: 'SOC 2 audit',  bu: 'forge', detail: 'SOC 2 Type II audit launched for Forge. Temporary dip during evidence collection.' },
    { date: new Date(2025, 2, 10), label: 'Vendor risk',  bu: 'orbit', detail: '3 vendors flagged in Orbit review. Integration cleanup triggered.' },
    { date: new Date(2025, 3, 21), label: 'Orbit dip',    bu: 'orbit', detail: 'Orbit score dropped — 2 controls showing stale evidence from failed sync.' },
    { date: new Date(2025, 8, 15), label: 'SOC 2 renewal',bu: 'forge', detail: 'Forge and Atlas SOC 2 renewals due Sep 2025. Evidence window opens Aug 1.' },
  ];

  // ── Insights Panel ────────────────────────────────────────────────────────
  function InsightsPanel({ buId, onChipClick }) {
    const bu = BU_META[buId];
    const [input, setInput]     = useState('');
    const [focused, setFocused] = useState(false);
    const [messages, setMessages] = useState([]);
    const [loading, setLoading]   = useState(false);
    const inputRef = useRef(null);
    const msgsRef  = useRef(null);

    useEffect(() => { msgsRef.current?.scrollTo(0, msgsRef.current.scrollHeight); }, [messages]);

    const submit = (q) => {
      const query = (q || input).trim();
      if (!query) return;
      setInput('');
      setMessages(prev => [...prev, { role: 'user', text: query }]);
      setLoading(true);
      setTimeout(() => {
        const answer = bu.answers[query]
          || `I'm analyzing ${bu.name}'s compliance data for this question. Based on current control coverage and evidence status, here's what I can tell you about "${query}":\n\nThis involves reviewing the active control domains and recent evidence submissions. For a detailed breakdown, I'd recommend looking at the specific control theme in the main Forge evidence tracker and cross-referencing with the latest audit prep checklist.`;
        setMessages(prev => [...prev, { role: 'ai', text: answer }]);
        setLoading(false);
      }, 900 + Math.random() * 400);
    };

    return (
      <div style={{ width: 300, flexShrink: 0, borderLeft: '1px solid rgba(0,0,0,0.06)', display: 'flex', flexDirection: 'column', background: 'rgba(250,250,249,0.8)', overflow: 'hidden' }}>

        {/* BU header */}
        <div style={{ padding: '20px 20px 16px', borderBottom: '1px solid rgba(0,0,0,0.06)' }}>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 4 }}>
            <span style={{ fontFamily: "'Fraunces',serif", fontSize: 36, fontWeight: 300, color: bu.color, letterSpacing: '-0.03em', lineHeight: 1 }}>{bu.score}</span>
            <span style={{ fontFamily: 'Inter', fontSize: 11, fontWeight: 600, color: bu.delta >= 0 ? '#059669' : '#DC2626' }}>
              {bu.delta >= 0 ? `↑ +${bu.delta}` : `↓ ${bu.delta}`} pts
            </span>
            <span style={{ fontFamily: 'Inter', fontSize: 10, color: '#C0BDB8', marginLeft: 'auto' }}>this month</span>
          </div>
          <div style={{ fontFamily: 'Inter', fontSize: 11, color: '#9CA3AF', marginBottom: 10 }}>{bu.summary}</div>
          <span style={{ fontFamily: 'Inter', fontSize: 9.5, fontWeight: 600, padding: '2px 9px', borderRadius: 20, background: bu.sBg, color: bu.sColor, letterSpacing: '0.02em' }}>{bu.status}</span>
        </div>

        {/* Insights */}
        {messages.length === 0 && (
          <div style={{ padding: '14px 16px', borderBottom: '1px solid rgba(0,0,0,0.06)', flexShrink: 0 }}>
            <div style={{ fontFamily: 'Inter', fontSize: 9.5, fontWeight: 600, color: '#C0BDB8', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 10 }}>Key insights</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {bu.insights.map((ins, i) => (
                <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'flex-start', padding: '8px 10px', background: ins.bg, borderRadius: 10 }}>
                  <span style={{ fontFamily: 'Inter', fontSize: 10, fontWeight: 700, color: ins.c, flexShrink: 0, marginTop: 1 }}>{ins.icon}</span>
                  <span style={{ fontFamily: 'Inter', fontSize: 11.5, color: '#374151', lineHeight: 1.45 }}>{ins.text}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Chat messages */}
        {messages.length > 0 && (
          <div ref={msgsRef} style={{ flex: 1, overflowY: 'auto', padding: '12px 16px', display: 'flex', flexDirection: 'column', gap: 10 }}>
            {messages.map((m, i) => (
              <div key={i} className={i === messages.length - 1 ? 'fade-up' : ''} style={{
                alignSelf: m.role === 'user' ? 'flex-end' : 'flex-start',
                maxWidth: '90%',
                padding: '9px 12px',
                borderRadius: m.role === 'user' ? '14px 14px 4px 14px' : '14px 14px 14px 4px',
                background: m.role === 'user' ? '#1E1B4B' : '#fff',
                border: m.role === 'ai' ? '1px solid rgba(0,0,0,0.07)' : 'none',
                fontFamily: 'Inter', fontSize: 12, color: m.role === 'user' ? '#fff' : '#374151',
                lineHeight: 1.55, whiteSpace: 'pre-wrap', boxShadow: m.role === 'ai' ? '0 1px 6px rgba(0,0,0,0.06)' : 'none',
              }}>{m.text}</div>
            ))}
            {loading && (
              <div style={{ alignSelf: 'flex-start', padding: '10px 14px', borderRadius: '14px 14px 14px 4px', background: '#fff', border: '1px solid rgba(0,0,0,0.07)', display: 'flex', gap: 4, alignItems: 'center' }}>
                {[0,1,2].map(i => (
                  <div key={i} style={{ width: 5, height: 5, borderRadius: '50%', background: '#7C3AED', opacity: 0.3, animation: `spin 1s ${i*0.18}s ease-in-out infinite` }}/>
                ))}
              </div>
            )}
          </div>
        )}

        {/* Suggested chips — only when no messages or after AI reply */}
        {(!loading && (messages.length === 0 || messages[messages.length-1]?.role === 'ai')) && (
          <div style={{ padding: messages.length > 0 ? '8px 12px' : '10px 16px', borderTop: messages.length > 0 ? '1px solid rgba(0,0,0,0.05)' : 'none', flexShrink: 0 }}>
            {messages.length === 0 && <div style={{ fontFamily: 'Inter', fontSize: 9.5, fontWeight: 600, color: '#C0BDB8', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 8 }}>Ask Ilma</div>}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
              {bu.chips.map((c, i) => (
                <button key={i} onClick={() => submit(c)} style={{ textAlign: 'left', padding: '7px 10px', borderRadius: 9, border: '1px solid rgba(91,33,182,0.12)', background: 'rgba(245,243,255,0.8)', fontFamily: 'Inter', fontSize: 11.5, fontWeight: 500, color: '#4C1D95', cursor: 'pointer', transition: 'background 0.12s', lineHeight: 1.3 }}
                  onMouseEnter={e => e.currentTarget.style.background = 'rgba(237,233,254,0.9)'}
                  onMouseLeave={e => e.currentTarget.style.background = 'rgba(245,243,255,0.8)'}
                >{c}</button>
              ))}
            </div>
          </div>
        )}

        {/* Ask input */}
        <div style={{ padding: '10px 12px 14px', borderTop: '1px solid rgba(0,0,0,0.06)', flexShrink: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, background: focused ? 'rgba(245,243,255,0.9)' : '#fff', border: focused ? '1px solid rgba(91,33,182,0.28)' : '1px solid rgba(0,0,0,0.08)', borderRadius: 12, padding: '8px 8px 8px 12px', transition: 'all 0.15s', boxShadow: focused ? '0 0 0 3px rgba(91,33,182,0.06)' : 'none' }}>
            <input ref={inputRef} value={input} onChange={e => setInput(e.target.value)}
              onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
              onKeyDown={e => e.key === 'Enter' && submit()}
              placeholder={`Ask about ${bu.name}…`}
              style={{ flex: 1, border: 'none', background: 'transparent', fontFamily: 'Inter', fontSize: 12, color: '#1E1B4B' }}
            />
            <button onClick={() => submit()} style={{ width: 28, height: 28, borderRadius: 8, border: 'none', background: input.trim() ? '#5B21B6' : 'rgba(0,0,0,0.06)', color: input.trim() ? '#fff' : '#C0BDB8', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: input.trim() ? 'pointer' : 'default', transition: 'background 0.15s, color 0.15s', flexShrink: 0 }}>
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 6 2 2v3.5l5 .5-5 .5V10z" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── Time Nav ──────────────────────────────────────────────────────────────
  function TimeNav({ wo, onBack, onFwd, onToday }) {
    const Arr = ({ dir, onClick }) => (
      <button onClick={onClick} style={{ width: 32, height: 32, borderRadius: 32, border: 'none', background: 'transparent', color: '#4B5563', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', transition: 'background 0.15s' }}
        onMouseEnter={e => e.currentTarget.style.background = 'rgba(0,0,0,0.05)'}
        onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
        {dir === '←'
          ? <svg width="12" height="12" viewBox="0 0 13 13" fill="none"><path d="M8.5 2L4 6.5l4.5 4.5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
          : <svg width="12" height="12" viewBox="0 0 13 13" fill="none"><path d="M4.5 2L9 6.5 4.5 11" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>}
      </button>
    );
    return (
      <div style={{ display: 'inline-flex', alignItems: 'center', background: 'rgba(255,255,255,0.85)', backdropFilter: 'blur(20px)', border: '1px solid rgba(255,255,255,0.9)', borderRadius: 40, padding: 4, boxShadow: '0 4px 20px rgba(30,27,75,0.10)' }}>
        <Arr dir="←" onClick={onBack}/>
        <button onClick={onToday} style={{ padding: '7px 18px', borderRadius: 36, border: 'none', background: wo === 0 ? '#1E1B4B' : 'transparent', color: wo === 0 ? '#fff' : '#9CA3AF', fontSize: 12.5, fontFamily: 'Inter', fontWeight: 500, cursor: 'pointer', transition: 'all 0.18s' }}>Today</button>
        <Arr dir="→" onClick={onFwd}/>
      </div>
    );
  }

  function WindowPicker({ value, onChange }) {
    return (
      <div style={{ display: 'inline-flex', background: 'rgba(255,255,255,0.80)', backdropFilter: 'blur(16px)', border: '1px solid rgba(255,255,255,0.9)', borderRadius: 32, padding: 4, boxShadow: '0 2px 12px rgba(30,27,75,0.08)' }}>
        {['1W','1M','3M','1Y'].map(o => (
          <button key={o} onClick={() => onChange(o)} style={{ padding: '6px 13px', borderRadius: 28, border: 'none', background: value === o ? '#1E1B4B' : 'transparent', color: value === o ? '#fff' : '#9CA3AF', fontSize: 11.5, fontFamily: 'Inter', fontWeight: 500, cursor: 'pointer', transition: 'all 0.15s' }}
            onMouseEnter={e => { if (value !== o) e.currentTarget.style.color = '#4B5563'; }}
            onMouseLeave={e => { if (value !== o) e.currentTarget.style.color = '#9CA3AF'; }}
          >{o}</button>
        ))}
      </div>
    );
  }

  // ── Chart ─────────────────────────────────────────────────────────────────
  function Chart({ buId, ws, wo, slice }) {
    const bu         = BU_META[buId];
    const contRef    = useRef(null);
    const [size, setSize]     = useState({ w: 600, h: 400 });
    const [hovered, setHov]   = useState(null);
    const [pinned, setPin]    = useState(null);
    const [panelOpen, setPO]  = useState(false);

    useEffect(() => {
      const ro = new ResizeObserver(([e]) => {
        const { width, height } = e.contentRect;
        setSize({ w: Math.round(width), h: Math.round(height) });
      });
      if (contRef.current) ro.observe(contRef.current);
      return () => ro.disconnect();
    }, []);

    useEffect(() => { setPin(null); setPO(false); setHov(null); }, [ws, wo]);

    const points = slice.map(d => ({ x: fmtDate(d.date, ws), y: d[buId], date: d.date, isForecast: d.isForecast, isToday: d.isToday, overall: d.score }));
    const yMin = 50, yMax = 100;
    const { w, h } = size;
    const PAD = { left: 48, right: 32, top: 80, bottom: 120 };
    const CW = w - PAD.left - PAD.right, CH = h - PAD.top - PAD.bottom;

    const sx = i => PAD.left + (i / (points.length - 1)) * CW;
    const sy = v => PAD.top + CH - ((v - yMin) / (yMax - yMin)) * CH;

    const solidIdxs = points.map((_,i)=>i).filter(i => !points[i].isForecast);
    const todayIdx  = points.findIndex(p => p.isToday);
    const fxIdxs    = todayIdx >= 0 ? points.map((_,i)=>i).slice(todayIdx) : [];

    const mkPath = idxs => idxs.map((i,n) => `${n===0?'M':'L'}${sx(i).toFixed(1)},${sy(points[i].y).toFixed(1)}`).join(' ');
    const solidPath = mkPath(solidIdxs);
    const fxPath    = fxIdxs.length > 1 ? mkPath(fxIdxs) : '';
    const areaPath  = solidIdxs.length > 1 ? [solidPath, `L${sx(solidIdxs[solidIdxs.length-1]).toFixed(1)},${(PAD.top+CH).toFixed(1)}`, `L${sx(solidIdxs[0]).toFixed(1)},${(PAD.top+CH).toFixed(1)} Z`].join(' ') : '';

    // Overall (trust) as faint reference line
    const overallPath = solidIdxs.map((i,n) => `${n===0?'M':'L'}${sx(i).toFixed(1)},${sy(points[i].overall).toFixed(1)}`).join(' ');

    // Events for this BU
    const events = ALL_EVENTS.filter(ev => ev.bu === buId).map(ev => {
      let best = -1, bestDiff = Infinity;
      slice.forEach((d, i) => { const diff = Math.abs(d.date - ev.date) / 86400000; if (diff < bestDiff) { bestDiff = diff; best = i; } });
      return bestDiff > 5 ? null : { ...ev, idx: best };
    }).filter(Boolean);

    const yTicks = [50, 62, 75, 87, 100];
    const skip   = { '1W': 1, '1M': 5, '3M': 14, '1Y': 45 }[ws] || 5;

    const handleMouseMove = useCallback(e => {
      const rect = e.currentTarget.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const colW = points.length > 1 ? CW / (points.length - 1) : CW;
      let best = null, bestDist = Infinity;
      points.forEach((_, i) => { const d = Math.abs(mx - sx(i)); if (d < bestDist) { bestDist = d; best = i; } });
      if (best !== null && bestDist < colW * 0.6) setHov({ idx: best, px: sx(best), py: sy(points[best].y), ...points[best] });
      else setHov(null);
    }, [points, CW, sx, sy]);

    const handleClick = useCallback(e => {
      const rect = e.currentTarget.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const colW = points.length > 1 ? CW / (points.length - 1) : CW;
      let best = null, bestDist = Infinity;
      points.forEach((_, i) => { const d = Math.abs(mx - sx(i)); if (d < bestDist) { bestDist = d; best = i; } });
      if (best !== null && bestDist < colW * 0.6) {
        if (best === pinned && panelOpen) { setPin(null); setPO(false); }
        else { setPin(best); setPO(true); }
      } else { setPin(null); setPO(false); }
    }, [points, pinned, panelOpen, sx, CW]);

    const pinnedPt = pinned !== null ? points[pinned] : null;

    return (
      <div ref={contRef} style={{ position: 'absolute', inset: 0 }}>
        <svg width={w} height={h} onMouseMove={handleMouseMove} onMouseLeave={() => setHov(null)}
          onClick={handleClick} style={{ display: 'block', cursor: 'crosshair', userSelect: 'none' }}>
          <defs>
            <linearGradient id="buag" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={bu.color} stopOpacity="0.15"/>
              <stop offset="100%" stopColor={bu.color} stopOpacity="0.01"/>
            </linearGradient>
            <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="3" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          {/* Y grid */}
          {yTicks.map(v => (
            <g key={v}>
              <line x1={PAD.left} y1={sy(v).toFixed(1)} x2={w - PAD.right} y2={sy(v).toFixed(1)} stroke="rgba(0,0,0,0.04)" strokeWidth="1"/>
              <text x={PAD.left - 10} y={sy(v) + 4} textAnchor="end" fontSize="10.5" fontFamily="Inter" fontWeight="500" fill="#C0BDB8">{v}</text>
            </g>
          ))}

          {/* Event bands */}
          {events.map(ev => {
            const bx = sx(ev.idx), bw = (points.length > 1 ? CW / (points.length - 1) : 60) * 1.6;
            return <rect key={ev.idx} x={(bx - bw/2).toFixed(1)} y={PAD.top} width={bw.toFixed(1)} height={CH} fill="rgba(0,0,0,0.035)"/>;
          })}

          {/* Overall trust line (faint reference) */}
          {overallPath && <path d={overallPath} fill="none" stroke="#C0BDB8" strokeWidth="1.2" strokeDasharray="4 3" strokeLinejoin="round" strokeLinecap="round" opacity="0.5"/>}

          {/* BU area + line */}
          {areaPath && <path d={areaPath} fill="url(#buag)"/>}
          {solidPath && <path d={solidPath} fill="none" stroke={bu.color} strokeWidth="2.6" strokeLinejoin="round" strokeLinecap="round"/>}
          {fxPath && <path d={fxPath} fill="none" stroke={bu.color} strokeWidth="2.6" strokeDasharray="7 5" strokeOpacity="0.45" strokeLinejoin="round" strokeLinecap="round"/>}

          {/* Today dot */}
          {todayIdx >= 0 && (
            <g>
              <circle cx={sx(todayIdx).toFixed(1)} cy={sy(points[todayIdx].y).toFixed(1)} r="9" fill={bu.color} fillOpacity="0.12"/>
              <circle cx={sx(todayIdx).toFixed(1)} cy={sy(points[todayIdx].y).toFixed(1)} r="4.5" fill={bu.color} stroke="white" strokeWidth="2.5" filter="url(#glow)"/>
            </g>
          )}

          {/* Hover */}
          {hovered && hovered.idx !== pinned && (
            <g opacity="0.6">
              <line x1={hovered.px.toFixed(1)} y1={PAD.top} x2={hovered.px.toFixed(1)} y2={PAD.top+CH} stroke={bu.color} strokeWidth="1" strokeOpacity="0.3"/>
              <circle cx={hovered.px.toFixed(1)} cy={hovered.py.toFixed(1)} r="5" fill={bu.color} stroke="white" strokeWidth="2.5"/>
            </g>
          )}

          {/* Pinned */}
          {pinned !== null && (
            <g>
              <line x1={sx(pinned).toFixed(1)} y1={PAD.top} x2={sx(pinned).toFixed(1)} y2={PAD.top+CH} stroke={bu.color} strokeWidth="1.5" strokeOpacity="0.25"/>
              <circle cx={sx(pinned).toFixed(1)} cy={sy(points[pinned].y).toFixed(1)} r="5.5" fill={bu.color} stroke="white" strokeWidth="2.5"/>
            </g>
          )}

          {/* X labels */}
          {points.map((p, i) => {
            const isFirst = i === 0, isLast = i === points.length - 1;
            if (!isFirst && !isLast && i % skip !== 0 && !p.isToday) return null;
            return <text key={i} x={sx(i).toFixed(1)} y={PAD.top+CH+22} textAnchor="middle" fontSize="10.5" fontFamily="Inter" fontWeight={p.isToday ? '600' : '500'} fill={p.isToday ? bu.color : pinned === i ? bu.color : '#C0BDB8'}>{p.x}</text>;
          })}

          {/* Forecast divider */}
          {wo < 0 && todayIdx >= 0 && <line x1={sx(todayIdx).toFixed(1)} y1={PAD.top} x2={sx(todayIdx).toFixed(1)} y2={PAD.top+CH} stroke={bu.color} strokeWidth="1" strokeDasharray="5 4" strokeOpacity="0.3"/>}
        </svg>

        {/* Event labels */}
        {events.map(ev => {
          const px = sx(ev.idx), pillW = 90;
          const left = Math.min(Math.max(px - pillW/2, PAD.left), w - PAD.right - pillW);
          return (
            <div key={ev.idx} onClick={() => { setPin(ev.idx); setPO(true); }} style={{ position: 'absolute', left, top: PAD.top - 26, width: pillW, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 4, padding: '3px 8px', background: 'rgba(255,255,255,0.88)', backdropFilter: 'blur(10px)', border: `1px solid ${bu.color}25`, borderRadius: 20, cursor: 'pointer', zIndex: 10 }}>
              <span style={{ width: 4, height: 4, borderRadius: '50%', background: bu.color, flexShrink: 0 }}/>
              <span style={{ fontSize: 9.5, fontFamily: 'Inter', fontWeight: 500, color: '#374151', whiteSpace: 'nowrap' }}>{ev.label}</span>
            </div>
          );
        })}

        {/* Score pill on hover */}
        {hovered && hovered.idx !== pinned && (
          <div style={{ position: 'absolute', left: hovered.px + 12, top: hovered.py - 12, background: bu.color, borderRadius: 20, padding: '4px 9px', display: 'flex', alignItems: 'center', gap: 5, pointerEvents: 'none', boxShadow: '0 2px 8px rgba(0,0,0,0.14)', opacity: 0.75 }}>
            <span style={{ fontFamily: "'Fraunces',serif", fontSize: 13, fontWeight: 300, color: '#fff', letterSpacing: '-0.01em' }}>{hovered.y}</span>
            <span style={{ fontFamily: 'Inter', fontSize: 9, fontWeight: 500, color: 'rgba(255,255,255,0.8)' }}>{hovered.x}</span>
          </div>
        )}

        {/* Pinned insight panel */}
        {panelOpen && pinnedPt && pinned !== null && (() => {
          const px = sx(pinned);
          const PANEL_W = 220, PANEL_LEFT = px + 16 + PANEL_W > w - PAD.right ? px - 16 - PANEL_W : px + 16;
          const prevScore = pinned > 0 ? points[pinned-1].y : pinnedPt.y;
          const delta = pinnedPt.y - prevScore;
          return (
            <div className="fade-up" onClick={e => e.stopPropagation()} style={{ position: 'absolute', left: PANEL_LEFT, top: PAD.top + 16, width: PANEL_W, background: 'rgba(255,255,255,0.97)', backdropFilter: 'blur(20px)', border: `1px solid ${bu.color}20`, borderRadius: 14, boxShadow: '0 12px 40px rgba(30,27,75,0.13)', overflow: 'hidden', zIndex: 40 }}>
              <div style={{ padding: '12px 14px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div>
                  <div style={{ fontSize: 9.5, fontFamily: 'Inter', fontWeight: 500, color: '#9CA3AF', letterSpacing: '0.07em', textTransform: 'uppercase', marginBottom: 3 }}>{pinnedPt.x}</div>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
                    <span style={{ fontFamily: "'Fraunces',serif", fontSize: 38, fontWeight: 300, color: bu.color, letterSpacing: '-0.03em', lineHeight: 1 }}>{pinnedPt.y}</span>
                    {delta !== 0 && <span style={{ fontSize: 11, fontFamily: 'Inter', fontWeight: 600, color: delta > 0 ? '#059669' : '#DC2626' }}>{delta > 0 ? `+${delta}` : delta}</span>}
                  </div>
                </div>
                <button onClick={() => { setPin(null); setPO(false); }} style={{ width: 20, height: 20, borderRadius: '50%', border: 'none', background: 'rgba(0,0,0,0.06)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 2 }}>
                  <svg width="8" height="8" viewBox="0 0 9 9" fill="none"><path d="M1.5 1.5l6 6M7.5 1.5l-6 6" stroke="#6B7280" strokeWidth="1.5" strokeLinecap="round"/></svg>
                </button>
              </div>
              <div style={{ padding: '8px 14px 13px', borderBottom: '1px solid rgba(0,0,0,0.05)' }}>
                <div style={{ display: 'flex', gap: 6, alignItems: 'flex-start' }}>
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{ flexShrink: 0, marginTop: 2 }}><path d="M5 1l.8 2.5H8L5.9 5l.8 2.7L5 6.2 2.3 7.7l.8-2.7L1 3.5h2.2L5 1z" fill="#7C3AED"/></svg>
                  <p style={{ fontSize: 11, fontFamily: 'Inter', color: '#4B5563', lineHeight: 1.5, margin: 0 }}>
                    {pinnedPt.isForecast
                      ? `Projected at ${pinnedPt.y} — based on current remediation velocity and open control status.`
                      : delta >= 3 ? `Score up ${delta} pts — evidence closures and control reviews driving the gain.`
                      : delta <= -2 ? `Score dropped ${Math.abs(delta)} pts — likely tied to stale evidence or new control gaps.`
                      : `Score held at ${pinnedPt.y} — no major anomalies in this period for ${bu.name}.`}
                  </p>
                </div>
              </div>
              <div style={{ padding: '8px 14px 10px' }}>
                <div style={{ fontSize: 9, fontFamily: 'Inter', fontWeight: 600, color: '#C0BDB8', letterSpacing: '0.07em', textTransform: 'uppercase', marginBottom: 6 }}>Overall score (all programs)</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <div style={{ flex: 1, height: 3, background: '#F3F4F6', borderRadius: 2, overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${((pinnedPt.overall - 50) / 50) * 100}%`, background: '#C0BDB8', borderRadius: 2 }}/>
                  </div>
                  <span style={{ fontFamily: 'Inter', fontSize: 11, fontWeight: 600, color: '#9CA3AF' }}>{pinnedPt.overall}</span>
                </div>
              </div>
            </div>
          );
        })()}

        {/* Big score + stat label */}
        <div style={{ position: 'absolute', bottom: 130, left: 24, pointerEvents: 'none' }}>
          <div style={{ fontSize: 9.5, fontFamily: 'Inter', fontWeight: 500, color: wo < 0 ? '#A78BFA' : bu.color, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 4, opacity: 0.8 }}>{wo < 0 ? 'PROJECTED ›' : `${bu.name.toUpperCase()} SCORE ›`}</div>
          <div style={{ fontFamily: "'Fraunces',serif", fontSize: 72, fontWeight: 300, color: '#1E1B4B', letterSpacing: '-0.04em', lineHeight: 1, marginBottom: 4 }}>{points[points.length-1]?.y}</div>
          <div style={{ fontFamily: 'Inter', fontSize: 12, color: bu.color }}>{wo < 0 ? `Projected · ${points[points.length-1]?.x}` : `${BU_META[buId].delta >= 0 ? '↑' : '↓'} ${Math.abs(BU_META[buId].delta)} pts this month`}</div>
        </div>

        {/* Reference legend */}
        <div style={{ position: 'absolute', bottom: 40, right: PAD.right + 8, display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <svg width="20" height="4"><line x1="0" y1="2" x2="20" y2="2" stroke={bu.color} strokeWidth="2.5" strokeLinecap="round"/></svg>
            <span style={{ fontFamily: 'Inter', fontSize: 9.5, color: '#9CA3AF' }}>{bu.name}</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <svg width="20" height="4"><line x1="0" y1="2" x2="20" y2="2" stroke="#C0BDB8" strokeWidth="1.2" strokeDasharray="3 2" strokeLinecap="round"/></svg>
            <span style={{ fontFamily: 'Inter', fontSize: 9.5, color: '#C0BDB8' }}>Overall</span>
          </div>
        </div>
      </div>
    );
  }

  // ── App ───────────────────────────────────────────────────────────────────
  function App() {
    const [ws, setWs] = useState('1M');
    const [wo, setWo] = useState(0);
    const slice = getSlice(ws, wo);
    const bu    = BU_META[BU_ID];

    return (
      <div style={{ display: 'flex', height: '100vh', width: '100vw', overflow: 'hidden', background: `linear-gradient(155deg,rgba(221,214,255,.35) 0%,rgba(240,237,255,.35) 30%,rgba(247,246,243,0) 70%),#F7F6F3` }}>

        {/* Chart area */}
        <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
          <Chart buId={BU_ID} ws={ws} wo={wo} slice={slice}/>

          {/* Time nav */}
          <div style={{ position: 'absolute', top: 20, left: '50%', transform: 'translateX(-50%)', zIndex: 30 }}>
            <TimeNav wo={wo} onBack={() => setWo(p => p < 0 ? 0 : p + 1)} onFwd={() => setWo(p => p === 0 ? -1 : p < 0 ? p : Math.max(0, p - 1))} onToday={() => setWo(0)}/>
          </div>

          {/* Window picker */}
          <div style={{ position: 'absolute', top: 20, right: 20, zIndex: 30 }}>
            <WindowPicker value={ws} onChange={setWs}/>
          </div>
        </div>

        {/* Right insights + ask panel */}
        <InsightsPanel buId={BU_ID}/>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
