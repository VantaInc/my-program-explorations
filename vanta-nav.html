<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanta — Nav</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── TYPE SYSTEM ─────────────────────────────────────────────────────────────
     Reckless  → 'Reckless','Reckless Neue' with Fraunces as Google Fonts fallback
                (editorial display, big numbers, hero headings)
     Nib       → Inter  (body copy, metadata, descriptions, form inputs)
  ─────────────────────────────────────────────────────────────────────────── */
  :root {
    --font-display: 'Reckless', 'Reckless Neue', 'Fraunces', Georgia, serif;
    --font-ui:      'Inter', sans-serif;
    --font-body:    'Inter', sans-serif;
    /* Purple gradient tokens */
    --grad-bg: linear-gradient(155deg, #EDE9FE 0%, #F0EDFF 12%, #F5F3FF 28%, #F7F6F3 55%, #F7F6F3 100%);
    --grad-subtle: linear-gradient(180deg, rgba(237,233,254,0.6) 0%, rgba(247,246,243,0) 100%);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    font-size: 14px; color: #1A1A1A; background: #F5F3FF;
    height: 100vh; overflow: hidden; display: flex;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ─── SIDEBAR ─── */
  #sidebar {
    width: 272px; flex-shrink: 0; background: #fff;
    border-right: 1px solid rgba(0,0,0,0.06);
    display: flex; flex-direction: column; height: 100vh;
    user-select: none; overflow: hidden;
  }

  /* workspace header */
  .ws-header {
    padding: 18px 16px 14px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; border-radius: 10px; margin: 6px 6px 0;
    transition: background 0.1s;
  }
  .ws-header:hover { background: rgba(0,0,0,0.03); }
  .ws-header.dropdown-open { background: rgba(0,0,0,0.04); }
  #sidebar { position: relative; }
  .ws-left { display: flex; align-items: center; gap: 10px; }
  .ws-logo {
    width: 26px; height: 26px; border-radius: 7px; background: #5B21B6;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .ws-name {
    font-family: var(--font-ui); font-size: 14px; font-weight: 600;
    color: #111827; letter-spacing: -0.02em;
  }

  /* ── Option B: inline search + action pills (replaces tab bar) ── */
  .inline-search {
    display: flex; align-items: center; gap: 7px;
    background: rgba(0,0,0,0.03); border-radius: 8px;
    padding: 8px 11px; margin: 0 8px 4px; flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .inline-search input {
    border: none; background: transparent; font-size: 13px;
    color: #111827; outline: none; flex: 1; font-family: var(--font-ui);
    letter-spacing: -0.01em;
  }
  .inline-search input::placeholder { color: #C0BDB8; }
  .action-strip {
    display: flex; gap: 6px; padding: 0 8px 6px; flex-shrink: 0;
  }
  .action-pill {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px;
    padding: 7px 10px; border-radius: 9px; border: none; cursor: pointer;
    font-family: var(--font-ui); font-size: 12px; font-weight: 500;
    letter-spacing: -0.01em; transition: background 0.1s, gap 0.15s;
  }
  .action-pill.home { background: rgba(0,0,0,0.03); color: #374151; border: 1px solid rgba(0,0,0,0.06); }
  .action-pill.home:hover { background: rgba(0,0,0,0.07); }
  .action-pill.ilma { background: rgba(0,0,0,0.03); color: #374151; border: 1px solid rgba(0,0,0,0.06); }
  .action-pill.ilma:hover { background: rgba(0,0,0,0.07); }
  .action-pill.ilma.active { background: #EDE9FE; color: #7C3AED; border-color: transparent; }
  .action-pill.inbox { background: rgba(0,0,0,0.03); color: #374151; border: 1px solid rgba(0,0,0,0.06); }
  .action-pill.inbox:hover, .action-pill.inbox.active { background: rgba(0,0,0,0.07); }

  /* nav body */
  .nav-body {
    flex: 1; overflow-y: auto; padding: 4px 12px 8px;
    min-height: 0;
  }
  .nav-body::-webkit-scrollbar { width: 3px; }
  .nav-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 2px; }

  .nav-section { margin-bottom: 6px; }
  .sec-label {
    font-family: var(--font-ui); font-size: 10px; font-weight: 600;
    color: rgba(55,65,81,0.3); letter-spacing: 0.09em; text-transform: uppercase;
    padding: 18px 8px 5px; display: block;
  }
  .nav-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px; border: none;
    background: transparent; cursor: pointer;
    font-size: 13px; font-weight: 400; color: #4B5563; font-family: var(--font-ui);
    width: 100%; text-align: left;
    transition: background 0.1s, color 0.1s;
    letter-spacing: -0.01em;
  }
  .nav-row:hover { background: rgba(0,0,0,0.04); color: #111827; }
  .nav-row.active {
    background: rgba(91,33,182,0.08); color: #5B21B6; font-weight: 500;
  }
  .row-icon {
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; color: #C0BDB8; transition: color 0.1s;
  }
  .nav-row:hover .row-icon { color: #9CA3AF; }
  .nav-row.active .row-icon { color: #7C3AED; }
  .row-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-meta { font-size: 11px; color: #C0BDB8; flex-shrink: 0; font-family: var(--font-ui); }
  .nav-row.active .row-meta { color: #A78BFA; }
  .prog-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* agent card */
  .agent-card {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 12px; border-radius: 10px; margin-bottom: 6px;
    background: #F7F3FF; border: 1px solid rgba(109,40,217,0.08);
    cursor: pointer; transition: background 0.1s, border-color 0.1s;
  }
  .agent-card:hover { background: #EDE9FE; border-color: rgba(109,40,217,0.15); }
  .agent-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: transparent;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    overflow: hidden;
  }
  .agent-name { font-family: var(--font-ui); font-size: 13px; font-weight: 500; color: #111827; letter-spacing: -0.01em; }
  .agent-desc { font-family: var(--font-ui); font-size: 11px; color: #9CA3AF; margin-top: 2px; }

  /* inbox items */
  .inbox-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 10px; border-radius: 8px; cursor: pointer;
    transition: background 0.1s; border: none; background: transparent;
    width: 100%; text-align: left; font-family: inherit;
  }
  .inbox-item:hover { background: rgba(0,0,0,0.04); }
  .inbox-item.active { background: rgba(91,33,182,0.08); }
  .inbox-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .inbox-title { font-size: 13px; font-weight: 400; color: #111827; line-height: 1.4; letter-spacing: -0.01em; font-family: var(--font-ui); }
  .inbox-item.active .inbox-title { font-weight: 500; color: #5B21B6; }
  .inbox-sub { font-size: 11px; color: #9CA3AF; margin-top: 2px; font-family: var(--font-ui); }

  /* search */
  .search-input-wrap {
    display: flex; align-items: center; gap: 7px;
    background: rgba(0,0,0,0.03); border-radius: 8px;
    padding: 8px 12px; margin-bottom: 10px;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .search-input-wrap input {
    border: none; background: transparent; font-size: 13px;
    color: #111827; outline: none; flex: 1; font-family: var(--font-ui);
    letter-spacing: -0.01em;
  }
  .search-input-wrap input::placeholder { color: #C0BDB8; }

  /* ─── BOTTOM MINIMAL STRIP (Option B) ─── */
  .bottom-minimal {
    padding: 8px 10px 12px; border-top: 1px solid rgba(0,0,0,0.05);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .user-chip {
    display: flex; align-items: center; gap: 8px; padding: 5px 8px;
    border-radius: 8px; cursor: pointer; transition: background 0.1s;
  }
  .user-chip:hover { background: rgba(0,0,0,0.04); }
  .user-avatar-sm {
    width: 24px; height: 24px; border-radius: 50%;
    background: #EDE9FE; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-ui); font-size: 10px; font-weight: 600; color: #5B21B6;
  }
  .user-name { font-family: var(--font-ui); font-size: 12px; font-weight: 500; color: #374151; letter-spacing: -0.01em; }
  .bottom-icons { display: flex; gap: 2px; }
  .icon-btn {
    width: 30px; height: 30px; border-radius: 7px; border: none; background: transparent;
    display: flex; align-items: center; justify-content: center; cursor: pointer; color: #C0BDB8;
    transition: background 0.1s, color 0.1s;
  }
  .icon-btn:hover { background: rgba(0,0,0,0.04); color: #374151; }


  /* ─── CONTENT AREA ─── */
  #content {
    flex: 1; overflow-y: auto;
    background:
      linear-gradient(155deg, rgba(221,214,255,0.5) 0%, rgba(232,226,255,0.5) 10%, rgba(237,233,254,0.5) 22%, rgba(240,237,255,0.5) 38%, rgba(245,243,255,0.5) 55%, rgba(247,246,243,0) 80%),
      #F7F6F3;
    background-attachment: fixed;
  }

  /* ─── PAGE HERO GRADIENT BAND ─── */
  /* Now transparent — full gradient lives on #content background */
  .page-hero {
    margin: -48px -64px 44px;
    padding: 48px 64px 44px;
    background: transparent;
  }
  #content::-webkit-scrollbar { width: 5px; }
  #content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

  .page { padding: 48px 64px; animation: fadein 0.15s ease; }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Ilma Sidebar ─────────────────────────────────────────────────────────── */
  #ilma-sidebar {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 380px; z-index: 850;
    background: #fff;
    border-left: 1px solid rgba(0,0,0,0.07);
    box-shadow: -12px 0 48px rgba(15,10,40,0.13), -2px 0 8px rgba(0,0,0,0.04);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.32s cubic-bezier(0.22,1,0.36,1);
    pointer-events: none;
  }
  #ilma-sidebar.open {
    transform: translateX(0);
    pointer-events: auto;
  }
  #ilma-sidebar-scrim {
    position: fixed; inset: 0; z-index: 849;
    background: rgba(15,10,40,0);
    transition: background 0.32s ease;
    pointer-events: none;
  }
  #ilma-sidebar-scrim.open {
    background: rgba(15,10,40,0.18);
    pointer-events: auto;
  }
  .ilma-msg-user {
    display: flex; justify-content: flex-end; margin-bottom: 10px;
  }
  .ilma-msg-user > div {
    background: rgba(124,58,237,0.1); color: #1A1A1A;
    padding: 9px 13px; border-radius: 16px 16px 4px 16px;
    font-size: 13px; max-width: 260px; line-height: 1.5;
    font-family: var(--font-body);
  }
  .ilma-msg-ai {
    display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start;
  }
  .ilma-msg-ai > div {
    background: #F9F8F7; border: 1px solid rgba(0,0,0,0.07);
    padding: 10px 13px; border-radius: 4px 16px 16px 16px;
    font-size: 13px; max-width: 280px; line-height: 1.6; color: #1A1A1A;
    font-family: var(--font-body);
  }
  #ilma-sidebar-log { scrollbar-width: thin; }
  #ilma-sidebar-input-box:focus-within {
    background: rgba(245,243,255,0.95) !important;
    border-color: rgba(124,58,237,0.28) !important;
  }

  /* BU modal grow animation */
  @keyframes bu-modal-grow {
    from { transform: translate(var(--modal-ox), var(--modal-oy)) scale(var(--modal-sx), var(--modal-sy)); opacity: 0.6; border-radius: 18px; }
    to   { transform: translate(0, 0) scale(1, 1); opacity: 1; border-radius: 20px; }
  }
  @keyframes bu-modal-shrink {
    from { transform: translate(0, 0) scale(1, 1); opacity: 1; }
    to   { transform: translate(var(--modal-ox), var(--modal-oy)) scale(var(--modal-sx), var(--modal-sy)); opacity: 0; }
  }
  .bu-expand-btn {
    position: absolute; top: 12px; right: 12px;
    width: 28px; height: 28px; border-radius: 8px;
    border: 1px solid rgba(0,0,0,0.08);
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0;
    transition: opacity 0.15s, background 0.15s, box-shadow 0.15s;
    z-index: 10; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .bu-expand-btn:hover { background: #fff; box-shadow: 0 4px 14px rgba(0,0,0,0.14); }

  /* page header */
  .page-header { margin-bottom: 40px; }
  /* Breadcrumb: Inter caps — UI label */
  .page-breadcrumb {
    font-family: var(--font-ui); font-size: 10px; font-weight: 500;
    color: #C0BDB8; margin-bottom: 12px; letter-spacing: 0.12em; text-transform: uppercase;
  }
  .page-heading { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .page-title-block { }
  /* Page title: Reckless — editorial display */
  .page-title {
    font-family: var(--font-display); font-size: 38px; font-weight: 300;
    color: #111827; margin-bottom: 8px; letter-spacing: -0.02em; line-height: 1.05;
  }
  /* Subtitle: Inter regular */
  .page-sub { font-family: var(--font-body); font-size: 14px; color: #9CA3AF; line-height: 1.6; }
  .page-actions { display: flex; gap: 8px; flex-shrink: 0; margin-top: 2px; }
  .btn {
    padding: 6px 14px; border-radius: 7px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid #E5E7EB; background: #fff;
    color: #374151; font-family: var(--font-ui); letter-spacing: -0.01em;
    transition: all 0.12s;
  }
  .btn:hover { background: #F9FAFB; }
  .btn.primary { background: #5B21B6; color: #fff; border-color: transparent; font-weight: 600; }
  .btn.primary:hover { background: #4C1D95; }

  /* stat cards — wide and flat */
  .stats-row { display: flex; gap: 14px; margin-bottom: 28px; }
  .stat-card {
    flex: 1; background: #fff; border: 1px solid #E9E9E7;
    border-radius: 14px; padding: 20px 28px;
    display: flex; align-items: center; gap: 20px;
  }
  .stat-value {
    font-family: var(--font-display); font-size: 42px; font-weight: 300;
    color: #111827; line-height: 1; letter-spacing: -0.02em; flex-shrink: 0;
  }
  .stat-card-text { flex: 1; min-width: 0; }
  .stat-label { font-family: var(--font-ui); font-size: 11px; font-weight: 500; color: #9CA3AF; letter-spacing: 0.07em; text-transform: uppercase; }
  .stat-trend { font-family: var(--font-body); font-size: 12px; margin-top: 4px; }

  /* health score block — no donut, big Reckless number + thin bar */
  .health-header {
    display: flex; align-items: center; gap: 36px; margin-bottom: 24px;
    background: #fff; border: 1px solid #E9E9E7; border-radius: 14px; padding: 22px 32px;
  }
  .health-score-block { flex-shrink: 0; text-align: center; min-width: 80px; }
  .health-score-num {
    font-family: var(--font-display); font-size: 48px; font-weight: 300;
    line-height: 1; letter-spacing: -0.02em;
  }
  .health-score-pct {
    font-family: var(--font-ui); font-size: 10px; font-weight: 500;
    color: #9CA3AF; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px;
  }
  .health-score-bar {
    height: 3px; background: #F0EEF8; border-radius: 2px; margin-top: 10px; overflow: hidden;
  }
  .health-score-fill { height: 100%; border-radius: 2px; }
  .health-meta { flex: 1; }
  .health-program-name {
    font-family: var(--font-display); font-size: 26px; font-weight: 300;
    color: #111827; margin-bottom: 8px; letter-spacing: -0.02em;
  }
  /* keep .health-ring class for backward compat but hide it */
  .health-ring { display: none; }
  .health-ring-num { display: none; }
  .health-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    font-family: var(--font-ui); font-size: 11px; font-weight: 500;
    padding: 3px 9px; border-radius: 20px; letter-spacing: 0;
  }
  .badge.framework { background: #EDE9FE; color: #5B21B6; }
  .badge.status-ok { background: #D1FAE5; color: #065F46; }
  .badge.status-warn { background: #FEF3C7; color: #92400E; }
  .badge.status-risk { background: #FEE2E2; color: #991B1B; }

  /* section cards — title: Outfit medium */
  .section-card {
    background: #fff; border: 1px solid #E9E9E7;
    border-radius: 14px; overflow: hidden; margin-bottom: 16px;
  }
  .section-card-header {
    padding: 14px 24px; border-bottom: 1px solid #F3F3F1;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-card-title {
    font-family: var(--font-ui); font-size: 10px; font-weight: 500;
    color: #C0BDB8; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .section-card-body { padding: 4px 0; }

  /* theme rows — name: Outfit, count: Inter */
  .theme-row {
    display: flex; align-items: center; gap: 16px;
    padding: 11px 24px; border-bottom: 1px solid #F7F6F3;
    cursor: pointer; transition: background 0.1s;
  }
  .theme-row:last-child { border-bottom: none; }
  .theme-row:hover { background: #FAFAF9; }
  .theme-name { font-family: var(--font-body); font-size: 13px; color: #1A1A1A; width: 200px; flex-shrink: 0; }
  .theme-bar-wrap { flex: 1; }
  .theme-bar { height: 3px; background: #F3F3F1; border-radius: 3px; overflow: hidden; }
  .theme-fill { height: 100%; border-radius: 3px; }
  .theme-count { font-family: var(--font-body); font-size: 11px; color: #9CA3AF; width: 60px; text-align: right; flex-shrink: 0; }
  /* pills: Inter UI labels */
  .status-pill {
    font-family: var(--font-ui); font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 20px; flex-shrink: 0; white-space: nowrap;
    letter-spacing: 0.01em;
  }
  .pill-pass { background: #D1FAE5; color: #065F46; }
  .pill-warn { background: #FEF3C7; color: #92400E; }
  .pill-risk { background: #FEE2E2; color: #991B1B; }
  .pill-review { background: #E0E7FF; color: #3730A3; }

  /* table — headers: Outfit caps, cells: Inter */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    font-family: var(--font-ui); font-size: 10px; font-weight: 500; color: #C0BDB8; text-align: left;
    padding: 14px 24px; border-bottom: 1px solid #E9E9E7; letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .data-table td {
    font-size: 13px; color: #374151; padding: 14px 24px;
    border-bottom: 1px solid #F3F3F1;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: #FAFAF9; }
  .td-name { font-family: var(--font-display); font-weight: 600; color: #111827; letter-spacing: -0.01em; }
  .td-light { font-family: var(--font-body); color: #9CA3AF; font-size: 12px; }

  /* two-col */
  .two-col { display: flex; gap: 20px; margin-bottom: 20px; }
  .two-col .col { flex: 1; min-width: 0; }
  .two-col .col-narrow { width: 380px; flex-shrink: 0; }

  /* activity */
  .activity-item {
    display: flex; gap: 12px; padding: 11px 24px;
    border-bottom: 1px solid #F3F3F1;
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
  }
  .activity-text { font-size: 13px; color: #374151; line-height: 1.45; }
  .activity-time { font-size: 11px; color: #9CA3AF; margin-top: 2px; }

  /* checklist */
  .check-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 24px; border-bottom: 1px solid #F3F3F1; cursor: pointer;
  }
  .check-item:last-child { border-bottom: none; }
  .check-item:hover { background: #FAFAF9; }
  .check-box {
    width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0;
    border: 1.5px solid #D1D5DB; display: flex; align-items: center; justify-content: center;
  }
  .check-box.checked { background: #059669; border-color: #059669; }
  .check-label { font-size: 13px; color: #374151; flex: 1; }
  .check-label.done { text-decoration: line-through; color: #9CA3AF; }
  .check-meta { font-size: 11px; color: #9CA3AF; }

  /* ilma chat */
  .chat-wrap { background: rgba(255,255,255,0.82); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.95); border-radius: 16px; overflow: hidden; }
  .chat-header { padding: 14px 20px; border-bottom: 1px solid #F3F3F1; display: flex; align-items: center; gap: 10px; }
  .chat-avatar { width: 30px; height: 30px; border-radius: 50%; background: transparent; display:flex;align-items:center;justify-content:center;flex-shrink:0; overflow: hidden; }
  /* Chat name: Outfit — feels like a product name */
  .chat-name { font-family: var(--font-display); font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .chat-status { font-family: var(--font-body); font-size: 11px; color: #059669; margin-top: 1px; }
  .chat-messages { padding: 20px; display: flex; flex-direction: column; gap: 14px; min-height: 260px; max-height: 340px; overflow-y: auto; }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .msg-ai { background: rgba(245,243,255,0.7); border: 1px solid rgba(109,40,217,0.08); border-radius: 12px 12px 12px 3px; padding: 12px 16px; font-family: var(--font-body); font-size: 13px; color: #374151; line-height: 1.65; max-width: 84%; }
  .msg-user { background: rgba(255,255,255,0.9); border: 1px solid rgba(0,0,0,0.06); border-radius: 12px 12px 3px 12px; padding: 12px 16px; font-family: var(--font-body); font-size: 13px; color: #374151; line-height: 1.65; max-width: 75%; align-self: flex-end; }
  .chat-input-wrap { padding: 12px 16px; border-top: 1px solid rgba(0,0,0,0.05); display: flex; gap: 8px; }
  .chat-input-wrap input { flex: 1; padding: 9px 14px; border: 1px solid rgba(0,0,0,0.08); border-radius: 10px; font-size: 13px; outline: none; background: rgba(255,255,255,0.8); font-family: var(--font-ui); color: #111827; }
  .chat-input-wrap input:focus { border-color: rgba(109,40,217,0.35); background: #fff; box-shadow: 0 0 0 3px rgba(109,40,217,0.06); }
  .chat-send { padding: 9px 14px; background: #5B21B6; color: #fff; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; transition: background 0.15s; }
  .chat-send:hover { background: #4C1D95; }

  /* vendor card grid */
  .vendor-grid { display: flex; flex-direction: column; gap: 0; }
  .vendor-row { display: flex; align-items: center; gap: 14px; padding: 14px 24px; border-bottom: 1px solid #F3F3F1; cursor: pointer; }
  .vendor-row:last-child { border-bottom: none; }
  .vendor-row:hover { background: #FAFAF9; }
  .vendor-logo { width: 28px; height: 28px; border-radius: 6px; background: #F3F4F6; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #374151; flex-shrink: 0; }
  .vendor-name { font-size: 13px; font-weight: 500; color: #111827; flex: 1; }
  .vendor-type { font-size: 12px; color: #9CA3AF; width: 120px; flex-shrink: 0; }
  .vendor-due { font-size: 12px; color: #9CA3AF; width: 80px; text-align: right; flex-shrink: 0; }

  /* empty state */
  .view-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: #9CA3AF; gap: 10px; }
  .view-empty svg { opacity: 0.3; }
  .view-empty p { font-size: 14px; }

  /* ─── ILMA SPOTLIGHT ─── */
  @keyframes toast-in {
    from { opacity:0; transform:translateY(12px) scale(0.97); }
    to   { opacity:1; transform:translateY(0)    scale(1); }
  }
  #ilma-spotlight {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(10,8,20,0.45); backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    align-items: flex-start; justify-content: center;
    padding-top: 16vh;
  }
  #ilma-spotlight.open { display: flex; animation: spotlight-bg-in 0.14s ease forwards; }
  @keyframes spin { to { transform: rotate(360deg) } }
  @keyframes ilma-dot {
    0%,80%,100% { opacity:0.25; transform:scale(0.85) }
    40% { opacity:1; transform:scale(1.1) }
  }
  @keyframes spotlight-bg-in {
    from { opacity: 0; } to { opacity: 1; }
  }
  .spotlight-box {
    width: 580px; max-width: calc(100vw - 32px);
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.9);
    box-shadow: 0 32px 80px rgba(0,0,0,0.28), 0 2px 8px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,1);
    overflow: hidden;
    animation: spotlight-box-in 0.2s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes spotlight-box-in {
    from { opacity: 0; transform: scale(0.95) translateY(-16px); }
    to   { opacity: 1; transform: scale(1)    translateY(0); }
  }
  .spotlight-input-row {
    display: flex; align-items: center; gap: 11px;
    padding: 15px 18px 15px 16px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .spotlight-avatar {
    width: 26px; height: 26px; flex-shrink: 0;
    border-radius: 50%; overflow: hidden;
  }
  #spotlight-input {
    flex: 1; border: none; outline: none; font-size: 16px;
    color: #111827; background: transparent;
    font-family: var(--font-display); font-weight: 300; letter-spacing: -0.01em;
  }
  #spotlight-input::placeholder { color: #D1D5DB; font-weight: 300; }
  .spotlight-kbd {
    font-family: var(--font-ui); font-size: 10px; color: #C0BDB8; flex-shrink: 0;
    background: rgba(0,0,0,0.04); border-radius: 5px; padding: 3px 7px;
    border: 1px solid rgba(0,0,0,0.08);
  }
  .spotlight-suggestions { padding: 6px 0 6px; max-height: 360px; overflow-y: auto; }
  .spotlight-section-label {
    font-family: var(--font-ui); font-size: 9px; font-weight: 600; color: #C0BDB8;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 8px 18px 4px;
  }
  .spotlight-row {
    display: flex; align-items: center; gap: 11px;
    padding: 8px 18px; cursor: pointer; transition: background 0.08s;
    border: none; background: transparent; width: 100%; text-align: left;
  }
  .spotlight-row:hover, .spotlight-row.focused { background: rgba(109,40,217,0.055); }
  .spotlight-row-icon {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .spotlight-row-text { font-family: var(--font-ui); font-size: 13px; font-weight: 400; color: #111827; flex: 1; letter-spacing: -0.01em; }
  .spotlight-row-meta { font-family: var(--font-ui); font-size: 11px; color: #C0BDB8; flex-shrink: 0; }
  .spotlight-footer {
    padding: 9px 18px; border-top: 1px solid rgba(0,0,0,0.05);
    display: flex; align-items: center; gap: 14px;
    background: rgba(0,0,0,0.015);
  }
  .spotlight-hint {
    display: flex; align-items: center; gap: 4px;
    font-family: var(--font-ui); font-size: 11px; color: #C0BDB8;
  }
  .spotlight-hint kbd {
    background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.08);
    border-radius: 4px; padding: 1px 5px;
    font-size: 10px; font-family: inherit; color: #9CA3AF;
  }
</style>
</head>

// ─── VIEW TEMPLATES ──────────────────────────────────────────────────────────

function programView(slug, name, health, color, frameworks, stats, themes, activity) {
  const statusLabel = health>=85?'On track':health>=75?'Needs attention':'At risk'
  const statusBg    = health>=85?'#D1FAE5':health>=75?'#FEF3C7':'#FEE2E2'
  const statusColor = health>=85?'#065F46':health>=75?'#92400E':'#991B1B'

  // Sparkline for health trend (last 8 weeks, derived from health score)
  const trendPts = Array.from({length:8},(_,i)=>{
    const delta = health>=85 ? i*0.4 : health>=75 ? -i*0.5 : -i*1.4
    return Math.min(99,Math.max(40, health - (7-i)*(health>=85?0.4:health>=75?0.5:1.4)))
  })
  const w=160,h=44,min=Math.min(...trendPts),max=Math.max(...trendPts),rng=max-min||1
  const xs=trendPts.map((_,i)=>(i/(trendPts.length-1))*w)
  const ys=trendPts.map(p=>h-((p-min)/rng)*(h*0.7)-h*0.15)
  const linePath=xs.map((x,i)=>`${i?'L':'M'}${x.toFixed(1)} ${ys[i].toFixed(1)}`).join(' ')
  const areaPath=linePath+` L${w} ${h} L0 ${h} Z`
  const gid=`pg${slug}`

  return `<div class="page">
    <div class="page-hero">

      <!-- Breadcrumb -->
      <div style="font-family:var(--font-ui);font-size:10px;font-weight:500;color:#C0BDB8;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:28px">Programs &nbsp;›&nbsp; ${name}</div>

      <!-- Hero: big number + trend side by side like Origin -->
      <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:40px">
        <div>
          <!-- Big health score — Origin dollar-amount treatment -->
          <div style="font-family:var(--font-display);font-size:72px;font-weight:300;color:${color};letter-spacing:-0.04em;line-height:1;margin-bottom:10px">${health}</div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span style="font-family:var(--font-ui);font-size:13px;font-weight:600;color:${color}">${statusLabel}</span>
            <span style="font-family:var(--font-ui);font-size:12px;color:#9CA3AF">Health score</span>
            <div style="height:3px;width:80px;background:#F0EEF8;border-radius:2px;overflow:hidden;margin-left:4px">
              <div style="height:100%;width:${health}%;background:${color};border-radius:2px"></div>
            </div>
          </div>
          <div style="display:flex;gap:6px;margin-top:14px;flex-wrap:wrap">
            ${frameworks.map(f=>`<span style="font-family:var(--font-ui);font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:#EDE9FE;color:#5B21B6">${f}</span>`).join('')}
            <span style="font-family:var(--font-ui);font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:${statusBg};color:${statusColor}">${statusLabel}</span>
          </div>
        </div>

        <!-- Trend sparkline + actions -->
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:18px">
          <div>
            <div style="font-family:var(--font-ui);font-size:9px;font-weight:600;color:#C0BDB8;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;text-align:right">8-week trend</div>
            <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible;display:block">
              <defs><linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.12"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
              <path d="${areaPath}" fill="url(#${gid})"/>
              <path d="${linePath}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="${xs[xs.length-1].toFixed(1)}" cy="${ys[ys.length-1].toFixed(1)}" r="3.5" fill="${color}"/>
            </svg>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn" onclick="renderView('controls');setActive('controls')">View controls</button>
            <button class="btn primary" onclick="renderView('reports-${slug}');setActive('reports-${slug}')">Generate report</button>
          </div>
        </div>
      </div>

      <!-- Stat row — Origin widget treatment -->
      <div style="display:flex;gap:14px">
        ${stats.map(s=>`
          <div style="flex:1;background:rgba(255,255,255,0.88);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.95);border-radius:16px;padding:24px 28px;display:flex;align-items:center;gap:20px">
            <div style="font-family:var(--font-display);font-size:44px;font-weight:300;color:#111827;letter-spacing:-0.03em;line-height:1;flex-shrink:0">${s.v}</div>
            <div>
              <div style="font-family:var(--font-ui);font-size:11px;font-weight:500;color:#9CA3AF;letter-spacing:0.07em;text-transform:uppercase">${s.l}</div>
            </div>
          </div>
        `).join('')}
        <div style="flex:1;background:rgba(255,255,255,0.88);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.95);border-radius:16px;padding:24px 28px;display:flex;align-items:center;gap:20px">
          <div style="font-family:var(--font-display);font-size:44px;font-weight:300;color:#111827;letter-spacing:-0.03em;line-height:1;flex-shrink:0">${themes.length}</div>
          <div>
            <div style="font-family:var(--font-ui);font-size:11px;font-weight:500;color:#9CA3AF;letter-spacing:0.07em;text-transform:uppercase">Control themes</div>
          </div>
        </div>
      </div>

    </div><!-- /page-hero -->

    <!-- Control themes section -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <span style="font-family:var(--font-ui);font-size:11px;font-weight:500;color:#9CA3AF;letter-spacing:0.08em;text-transform:uppercase">Control themes &nbsp;›</span>
      <span style="font-family:var(--font-ui);font-size:11px;color:#C0BDB8">${themes.length} areas</span>
    </div>

    <div style="display:flex;gap:16px;margin-bottom:32px;align-items:flex-start">
      <!-- Theme list -->
      <div style="flex:1;background:#fff;border:1px solid #E9E9E7;border-radius:16px;overflow:hidden">
        ${themes.map((t,i)=>`
          <div style="display:flex;align-items:center;gap:0;border-bottom:${i<themes.length-1?'1px solid rgba(0,0,0,0.04)':'none'};transition:background 0.1s;cursor:pointer" onmouseenter="this.style.background='#FAFAF9'" onmouseleave="this.style.background='transparent'">
            <div style="width:3px;background:${t.color};flex-shrink:0;align-self:stretch"></div>
            <div style="flex:1;padding:22px 28px;display:flex;align-items:center;gap:20px;min-width:0">
              <div style="font-family:var(--font-body);font-size:14px;color:#111827;min-width:180px;flex-shrink:0">${t.name}</div>
              <div style="flex:1;display:flex;flex-direction:column;gap:5px">
                <div style="height:4px;background:#F3F3F1;border-radius:4px;overflow:hidden">
                  <div style="height:100%;width:${t.pct}%;background:${t.color};border-radius:4px;transition:width 0.4s ease"></div>
                </div>
              </div>
              <div style="font-family:var(--font-display);font-size:22px;font-weight:300;color:#111827;letter-spacing:-0.02em;flex-shrink:0;min-width:56px;text-align:right">${t.pct}%</div>
              <div style="font-family:var(--font-ui);font-size:11px;color:#9CA3AF;flex-shrink:0;min-width:52px;text-align:right">${t.pass}/${t.total}</div>
              <span class="status-pill ${t.pill}" style="flex-shrink:0">${t.label}</span>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- Activity feed -->
      <div style="width:320px;flex-shrink:0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
          <span style="font-family:var(--font-ui);font-size:11px;font-weight:500;color:#9CA3AF;letter-spacing:0.08em;text-transform:uppercase">Activity &nbsp;›</span>
        </div>
        <div style="background:#fff;border:1px solid #E9E9E7;border-radius:16px;overflow:hidden">
          ${activity.map((a,i)=>`
            <div style="display:flex;gap:14px;padding:20px 22px;border-bottom:${i<activity.length-1?'1px solid rgba(0,0,0,0.04)':'none'}">
              <div style="width:6px;height:6px;border-radius:50%;background:${a.color};flex-shrink:0;margin-top:5px"></div>
              <div style="flex:1;min-width:0">
                <div style="font-family:var(--font-body);font-size:13px;color:#374151;line-height:1.55;margin-bottom:5px">${a.text}</div>
                <div style="font-family:var(--font-ui);font-size:11px;color:#C0BDB8">${a.time}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  </div>`
}

function tableView(title, breadcrumb, cols, rows, actions='') {
  return `<div class="page">
    <div class="page-hero">
      <div class="page-header">
        <div class="page-breadcrumb">${breadcrumb}</div>
        <div class="page-heading">
          <div class="page-title-block"><h1 class="page-title">${title}</h1></div>
          <div class="page-actions">${actions}</div>
        </div>
      </div>
    </div>
    <div class="section-card">
      <div class="section-card-body">
        <table class="data-table">
          <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
          <tbody>${rows.map(r=>`<tr>${r.map((cell,i)=>`<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>
    </div>
  </div>`
}

const VIEWS = {

  'home-page': () => {
    // ── full-width sparkline helper (Origin style) ──
    const spark = (pts, color) => {
      const w=200, h=52
      const min = Math.min(...pts), max = Math.max(...pts)
      const rng = max - min || 1
      const xs = pts.map((_,i) => (i/(pts.length-1))*w)
      const ys = pts.map(p => h - ((p-min)/rng)*(h*0.75) - h*0.08)
      const path = xs.map((x,i) => `${i?'L':'M'}${x.toFixed(1)} ${ys[i].toFixed(1)}`).join(' ')
      const areaPath = path + ` L${w} ${h} L0 ${h} Z`
      const lx = xs[xs.length-1].toFixed(1), ly = ys[ys.length-1].toFixed(1)
      const gradId = `gs${Math.round(Math.random()*99999)}`
      const dotTop = (parseFloat(ly) - 4).toFixed(1)
      return `<div style="position:relative;width:100%;height:${h}px">
        <svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block;position:absolute;inset:0">
          <defs><linearGradient id="${gradId}" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="${color}" stop-opacity="0.28"/>
            <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
          </linearGradient></defs>
          <path d="${areaPath}" fill="url(#${gradId})"/>
          <path d="${path}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div style="position:absolute;right:-4px;top:${dotTop}px;width:8px;height:8px;border-radius:50%;background:${color};box-shadow:0 0 6px ${color}88;pointer-events:none"></div>
      </div>`
    }

      <script>
      let _aiModeOn = false

      function toggleAIMode() {
        _aiModeOn = !_aiModeOn
        const root = document.getElementById('home-page-root')
        const overlay = document.getElementById('home-ai-mode')
        const btn = document.getElementById('ai-mode-toggle-btn')

        if (_aiModeOn) {
          // Fade standard content
          Array.from(root.children).forEach(el => {
            if (el.id === 'home-ai-mode' || el.tagName === 'STYLE' || el.tagName === 'SCRIPT') return
            el.style.transition = 'opacity 0.3s ease, transform 0.35s ease'
            el.style.opacity = '0'
            el.style.transform = 'scale(0.97) translateY(8px)'
            el.style.pointerEvents = 'none'
          })
          // Show overlay
          overlay.style.display = 'block'
          requestAnimationFrame(() => requestAnimationFrame(() => { overlay.style.opacity = '1' }))
          // Reset landing state
          document.getElementById('ai-landing').style.display = 'flex'
          document.getElementById('ai-generating').style.display = 'none'
          document.getElementById('ai-result').style.display = 'none'
          // Update button
          btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="#5B21B6" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg> Exit AI Mode'
          btn.style.background = '#EDE9FE'
          // Focus input
          setTimeout(() => { const inp = document.getElementById('ai-mode-input'); if(inp) inp.focus() }, 350)
        } else {
          // Fade overlay out
          overlay.style.opacity = '0'
          setTimeout(() => { overlay.style.display = 'none' }, 300)
          // Restore standard content
          Array.from(root.children).forEach(el => {
            if (el.id === 'home-ai-mode' || el.tagName === 'STYLE' || el.tagName === 'SCRIPT') return
            el.style.transition = 'opacity 0.35s ease, transform 0.4s ease'
            el.style.opacity = '1'
            el.style.transform = 'none'
            el.style.pointerEvents = ''
          })
          // Reset button
          btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="2.5" fill="#7C3AED"/><circle cx="6" cy="6" r="5" stroke="#7C3AED" stroke-width="1.2" stroke-dasharray="2.5 2"/></svg> AI Mode'
          btn.style.background = 'rgba(245,243,255,0.9)'
          _aiModeOn = false
        }
      }

      async function submitAIPrompt(query) {
        // Switch to generating state
        document.getElementById('ai-landing').style.display = 'none'
        document.getElementById('ai-result').style.display = 'none'
        const gen = document.getElementById('ai-generating')
        gen.style.display = 'flex'
        document.getElementById('ai-gen-label').textContent = 'Ilma is building your view…'

        let narrative = ''
        try {
          narrative = await _ilmaApi(
            [{ role:'user', text: query }],
            'The user is in AI Mode on the home dashboard — generate a sharp, data-driven narrative (2–4 sentences, no lists) about the program based on their question. Reference specific programs, controls, or metrics where relevant. End with a concrete recommendation.'
          )
        } catch(e) {
          narrative = 'Orbit remains the highest-risk program heading into the audit window — the Okta IdP connector has been offline 47 days, leaving 5 Access Management controls without evidence. Atlas is pacing 4 days late on auditor response time; two requests need owners assigned today. Forge is audit-ready at 89% evidence collected with 12 days to go.'
        }

        // Build result cards based on query keywords
        const lq = query.toLowerCase()
        const cards = lq.includes('orbit') || lq.includes('access') ? [
          { n:'71', l:'Orbit Health', color:'#DC2626', sub:'At risk · -3 this week' },
          { n:'5', l:'Failing Controls', color:'#DC2626', sub:'AC-2, AC-3, AC-6, AC-9, AC-10' },
          { n:'47', l:'Days IdP Offline', color:'#D97706', sub:'Root cause of all 5 failures' }
        ] : lq.includes('audit') || lq.includes('forge') ? [
          { n:'91', l:'Forge Health', color:'#059669', sub:'On track · +2 this week' },
          { n:'89%', l:'Evidence Collected', color:'#059669', sub:'3 items remaining' },
          { n:'12', l:'Days to Audit', color:'#5B21B6', sub:'Opens May 18' }
        ] : lq.includes('vendor') || lq.includes('gap') ? [
          { n:'3', l:'Vendor Gaps', color:'#D97706', sub:'Snowflake · Datadog · Okta' },
          { n:'60%', l:'Okta Questionnaire', color:'#DC2626', sub:'3 days to deadline' },
          { n:'2', l:'Blocked Controls', color:'#DC2626', sub:'ISO 27001 A.15.1.2, A.15.2.1' }
        ] : [
          { n:'84', l:'Avg Program Health', color:'#D97706', sub:'Across Forge · Atlas · Orbit' },
          { n:'6', l:'Open Items', color:'#DC2626', sub:'2 critical · 4 medium' },
          { n:'12', l:'Days to Audit', color:'#5B21B6', sub:'Forge SOC 2 · May 18' }
        ]

        const timelineRows = [
          { date:'Today', label:'Assign auditor request owners (Atlas)', pill:'Urgent', pillColor:'#DC2626', pillBg:'#FEE2E2' },
          { date:'May 15', label:'Marcus Webb reconnects Okta IdP connector', pill:'Scheduled', pillColor:'#5B21B6', pillBg:'#EDE9FE' },
          { date:'May 18', label:'Forge SOC 2 audit window opens', pill:'12 days out', pillColor:'#059669', pillBg:'#D1FAE5' },
          { date:'May 22', label:'Orbit IdP remediation deadline', pill:'16 days out', pillColor:'#6B7280', pillBg:'#F3F4F6' },
        ]

        // Populate result
        document.getElementById('ai-result-query-label').textContent = '· "' + (query.length > 48 ? query.slice(0,48)+'…' : query) + '"'
        document.getElementById('ai-result-narrative').innerHTML = narrative.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        document.getElementById('ai-result-cards').innerHTML = cards.map(c => \`
          <div style="background:rgba(255,255,255,0.88);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.95);border-radius:16px;padding:22px 24px">
            <div style="font-family:var(--font-display);font-size:42px;font-weight:300;color:\${c.color};letter-spacing:-0.04em;line-height:1;margin-bottom:6px">\${c.n}</div>
            <div style="font-family:var(--font-ui);font-size:12px;font-weight:600;color:#374151;margin-bottom:4px">\${c.l}</div>
            <div style="font-family:var(--font-ui);font-size:10px;color:#C0BDB8">\${c.sub}</div>
          </div>
        \`).join('')
        document.getElementById('ai-result-timeline').innerHTML = timelineRows.map((r,i) => \`
          <div style="display:flex;align-items:center;padding:16px 24px;border-bottom:\${i<timelineRows.length-1?'1px solid rgba(0,0,0,0.05)':'none'}">
            <div style="min-width:80px;font-family:var(--font-ui);font-size:11px;font-weight:600;color:#9CA3AF;letter-spacing:0.04em">\${r.date}</div>
            <div style="flex:1;font-family:var(--font-body);font-size:13px;color:#111827">\${r.label}</div>
            <span style="font-family:var(--font-ui);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:\${r.pillBg};color:\${r.pillColor};white-space:nowrap;letter-spacing:0.04em;text-transform:uppercase">\${r.pill}</span>
          </div>
        \`).join('')

        // Transition to result
        gen.style.display = 'none'
        const res = document.getElementById('ai-result')
        res.style.display = 'flex'
        res.style.flexDirection = 'column'
        res.style.opacity = '0'
        res.style.transform = 'translateY(12px)'
        res.style.transition = 'opacity 0.3s ease, transform 0.35s ease'
        requestAnimationFrame(() => requestAnimationFrame(() => {
          res.style.opacity = '1'
          res.style.transform = 'none'
        }))
      }

      function exportAIReport() {
        showGenerating('AI-Generated Program Report')
      }
      <\/script>

    </div>`
  },

            </div>
          </div>
        </div>
      </div>
      <div class="chat-wrap">
        <div class="chat-messages" id="chat-msgs" style="min-height:200px">
          ${seed ? `
            <div class="msg-user">${seed.prompt}</div>
            <div class="msg-ai" id="ilma-seed-reply" style="opacity:0;transition:opacity 0.3s ease">${seed.reply}</div>
          ` : `
            <div class="msg-ai">Hey Pam — what do you need today? I can surface blockers, summarize health across programs, draft a report, or answer anything about your controls and evidence.</div>
          `}
        </div>
        <div class="chat-input-wrap">
          <input id="chat-input" type="text" placeholder="What's my biggest risk right now?" />
          <button class="chat-send" id="chat-send">↑</button>
        </div>
      </div>
      <script>
      ;(function() {
        // Seed reply fade-in
        const seedEl = document.getElementById('ilma-seed-reply')
        if (seedEl) setTimeout(() => { seedEl.style.opacity = '1' }, 80)

        // Chat log for this view (separate from sidebar log)
        let _chatLog = []
        ${seed ? `_chatLog = [{ role:'user', text:${JSON.stringify(seed.prompt)} }, { role:'ai', text:${JSON.stringify(seed.reply)} }]` : ''}

        function appendMsg(role, html) {
          const msgs = document.getElementById('chat-msgs')
          if (!msgs) return
          const el = document.createElement('div')
          el.className = role === 'user' ? 'msg-user' : 'msg-ai'
          el.innerHTML = html
          msgs.appendChild(el)
          msgs.scrollTop = msgs.scrollHeight
          return el
        }

        async function sendChat() {
          const inp = document.getElementById('chat-input')
          const btn = document.getElementById('chat-send')
          const txt = inp?.value?.trim()
          if (!txt || inp.disabled) return
          inp.value = ''
          inp.disabled = true
          btn.disabled = true
          _chatLog.push({ role:'user', text:txt })
          appendMsg('user', txt)

          const msgs = document.getElementById('chat-msgs')
          const typing = document.createElement('div')
          typing.className = 'msg-ai'
          typing.id = 'chat-typing'
          typing.innerHTML = '<div style="display:flex;gap:4px;align-items:center;padding:2px 0"><span style="width:5px;height:5px;border-radius:50%;background:#C0BDB8;animation:ilma-dot 1.2s infinite 0s"></span><span style="width:5px;height:5px;border-radius:50%;background:#C0BDB8;animation:ilma-dot 1.2s infinite 0.2s"></span><span style="width:5px;height:5px;border-radius:50%;background:#C0BDB8;animation:ilma-dot 1.2s infinite 0.4s"></span></div>'
          msgs?.appendChild(typing)
          if (msgs) msgs.scrollTop = msgs.scrollHeight

          try {
            const reply = await _ilmaApi(_chatLog)
            document.getElementById('chat-typing')?.remove()
            _chatLog.push({ role:'ai', text:reply })
            appendMsg('ai', reply.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>'))
          } catch(e) {
            document.getElementById('chat-typing')?.remove()
            appendMsg('ai', 'API error — make sure <code>ANTHROPIC_API_KEY</code> is set in Vercel.')
          } finally {
            inp.disabled = false
            btn.disabled = false
            inp.focus()
          }
        }

        document.getElementById('chat-send')?.addEventListener('click', sendChat)
        document.getElementById('chat-input')?.addEventListener('keydown', e => { if(e.key==='Enter') sendChat() })
      })()
      <\/script>
    </div>`
  },

let dropdownOpen = false

function toggleCtxDropdown(e) {
  e.stopPropagation()
  dropdownOpen = !dropdownOpen
  const dd = document.getElementById('ctx-dropdown')
  const trigger = document.getElementById('ws-trigger')
  const chevron = document.getElementById('ws-chevron')
  dd.style.display = dropdownOpen ? 'block' : 'none'
  trigger.classList.toggle('dropdown-open', dropdownOpen)
  chevron.style.transform = dropdownOpen ? 'rotate(180deg)' : ''
}

function setContext(slug) {
  currentCtx = slug
  dropdownOpen = false

  const meta = CTX_META[slug]
  const dd = document.getElementById('ctx-dropdown')
  const trigger = document.getElementById('ws-trigger')
  const chevron = document.getElementById('ws-chevron')

  // Update header display
  document.getElementById('ws-name').textContent = meta.name
  document.getElementById('ws-context-label').textContent = meta.label
  const logo = document.getElementById('ws-logo')
  logo.style.background = meta.logoBg
  logo.textContent = meta.logoText

  // Update checkmarks
  ;['company','forge','atlas','orbit'].forEach(s => {
    const el = document.getElementById(`ctx-${s}-check`)
    if (el) el.style.display = s === slug ? 'block' : 'none'
  })

  // Close dropdown
  dd.style.display = 'none'
  trigger.classList.remove('dropdown-open')
  chevron.style.transform = ''

  // Re-render nav for new context, then navigate

    navBody.innerHTML = BU_NAV[ctx] ? BU_NAV[ctx]() : ''

  // re-wire nav-row clicks
  navBody.querySelectorAll('[data-view]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation()
      renderView(el.dataset.view)

}

// ─── TASK TOGGLE ─────────────────────────────────────────────────────────────
function toggleTask(id) {
  // Re-render the view with the task toggled
  // For prototype: just visually flip the card
  const card = document.getElementById(`task-${id}`)
  if (!card) return
  const checkbox = card.querySelector('div > div:first-child')
  const isDone = card.style.background.includes('240,253')
  if (isDone) {
    card.style.background = 'rgba(255,255,255,0.9)'
    card.style.borderColor = 'rgba(255,255,255,0.95)'
    checkbox.style.background = 'transparent'
    checkbox.style.borderColor = 'rgba(0,0,0,0.15)'
    checkbox.innerHTML = ''
  } else {
    card.style.background = 'rgba(240,253,244,0.8)'
    card.style.borderColor = 'rgba(5,150,105,0.15)'
    checkbox.style.background = '#059669'
    checkbox.style.borderColor = '#059669'
    checkbox.innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2"><path d="M2 5L4.5 7.5L8 3"/></svg>`
    const titleEl = card.querySelector('span[style*="font-weight:500"]')
    if (titleEl) { titleEl.style.textDecoration = 'line-through'; titleEl.style.color = '#6B7280' }
  }
}

// ─── RENDER VIEW ─────────────────────────────────────────────────────────────

function renderView(id) {
  const content = document.getElementById('content')
  const view = VIEWS[id] || VIEWS['home-page']
  content.innerHTML = view()
  // Re-execute any <script> blocks injected via innerHTML (innerHTML doesn't run them)
  content.querySelectorAll('script').forEach(oldScript => {
    const newScript = document.createElement('script')
    newScript.textContent = oldScript.textContent
    document.head.appendChild(newScript)
    oldScript.remove()
  })
  // wire up ilma chat if present
  const sendBtn = document.getElementById('chat-send')
  const chatInput = document.getElementById('chat-input')
  if (sendBtn && chatInput) {
    const send = () => {
      const msg = chatInput.value.trim()
      if (!msg) return
      const msgs = document.getElementById('chat-msgs')
      msgs.innerHTML += `<div class="msg-user">${msg}</div>`
      chatInput.value = ''
      msgs.scrollTop = msgs.scrollHeight
      setTimeout(() => {
        msgs.innerHTML += `<div class="msg-ai">On it. Let me pull up the relevant context for you...</div>`
        msgs.scrollTop = msgs.scrollHeight
      }, 800)
    }
    sendBtn.addEventListener('click', send)
    chatInput.addEventListener('keydown', e => { if (e.key==='Enter') send() })
    // fade in seeded reply if present
    const seedReply = document.getElementById('ilma-seed-reply')
    if (seedReply) setTimeout(() => { seedReply.style.opacity = '1' }, 420)
  }
  // content area: all data-view elements (program chips, recent cards, rec buttons, table rows)
  document.querySelectorAll('#content [data-view]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation()
      renderView(el.dataset.view)
      setActive(el.dataset.view)
    })
  })
}

// ─── ACTIVE STATE ────────────────────────────────────────────────────────────

function setActive(id) {
  document.querySelectorAll('.nav-row, .inbox-item').forEach(el => el.classList.remove('active'))
  document.querySelectorAll('.bn-item').forEach(el => el.classList.remove('active'))
  const match = document.querySelector(`[data-view="${id}"]`)
  if (match) match.classList.add('active')
}

// ── BU Series data generator (deterministic) ──────────────────────────────────
function _buRand(seed) {
  let s = (seed * 1664525 + 1013904223) >>> 0
  return () => { s = Math.imul(s, 1664525) + 1013904223 >>> 0; return s / 4294967296 }
}

function generateBUSeries(slug) {
  const seed = slug.split('').reduce((a, c, i) => a + c.charCodeAt(0) * (i + 7), 0)
  const rand = _buRand(seed)
  const cfgs = {
    forge:    { base: 74, end: 84, noise: 2.4 },
    orbit:    { base: 77, end: 73, noise: 3.1, dip: { start: 325, depth: 8, width: 32 } },
    sentinel: { base: 87, end: 91, noise: 1.4 },
    atlas:    { base: 63, end: 67, noise: 3.6, dip: { start: 270, depth: 5, width: 38 } },
    nexus:    { base: 56, end: 78, noise: 2.1 }
  }
  const cfg = cfgs[slug] || { base: 68, end: 74, noise: 3 }
  const pts = []
  const base = new Date(2025, 4, 12)
  for (let i = 0; i < 365; i++) {
    const d = new Date(base); d.setDate(d.getDate() + i)
    const t = i / 364
    let sc = cfg.base + (cfg.end - cfg.base) * (t * t * (3 - 2 * t))
    sc += (rand() - 0.5) * cfg.noise * 2.4
    sc += Math.sin(i * 0.17 + seed) * cfg.noise * 0.35
    if (cfg.dip) {
      const dist = i - cfg.dip.start
      if (dist >= 0 && dist < cfg.dip.width)
        sc -= Math.sin((dist / cfg.dip.width) * Math.PI) * cfg.dip.depth
    }
    pts.push({ date: d, score: Math.min(100, Math.max(40, Math.round(sc * 10) / 10)) })
  }
  return pts
}

    return { bg:'rgba(0,0,0,0.04)', bd:'rgba(0,0,0,0.1)', tx:'#374151' }
  }

      <span style="font-size:9.5px;font-family:Inter,sans-serif;font-weight:500;color:rgba(255,255,255,0.75)">Score</span>
    </div>`
  }

  // Draws the chart at actual pixel dimensions — no viewBox distortion
  function drawChart(data) {
    const svg  = document.getElementById('buChartSvg')
    const wrap = document.getElementById('buChartWrap')
    const endPill = document.getElementById('buEndPill')
    const endScore = document.getElementById('buEndScore')
    if (!svg || !wrap) return

    const W = wrap.offsetWidth  || 600
    const H = wrap.offsetHeight || 300
    const pL=52, pR=56, pT=16, pB=44
    const cW=W-pL-pR, cH=H-pT-pB

    const scores = data.map(p=>p.score)
    const lo = Math.max(50, Math.min(...scores)-6)
    const hi = Math.min(100, Math.max(...scores)+5)
    const rng = hi-lo||1
    const px = i => pL + (i/Math.max(data.length-1,1))*cW
    const py = s => pT + (1-(s-lo)/rng)*cH

    const yStep = rng>30?10:rng>15?5:2
    const yTicks=[]
    for(let v=Math.ceil(lo/yStep)*yStep; v<=hi; v+=yStep) yTicks.push(v)

    const tc = Math.min(6, data.length)
    const xTicks = Array.from({length:tc}, (_,i) => {
      const idx = Math.round(i*(data.length-1)/(tc-1))
      const d = data[idx].date
      return { x:px(idx), label:d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) }
    })

    const n = data.length
    const solidPath = data.map((p,i)=>`${i===0?'M':'L'}${px(i).toFixed(1)},${py(p.score).toFixed(1)}`).join(' ')
    const areaD = `${solidPath} L${px(n-1).toFixed(1)},${(pT+cH).toFixed(1)} L${px(0).toFixed(1)},${(pT+cH).toFixed(1)}Z`
    const ecx = px(n-1), ecy = py(data[n-1].score)

    svg.setAttribute('viewBox', `0 0 ${W} ${H}`)
    svg.setAttribute('width', W)
    svg.setAttribute('height', H)
    svg.innerHTML = `
      <defs>
        <linearGradient id="buGrad" x1="0" y1="0" x2="0" y2="1">

          <stop offset="100%" stop-color="${meta.color}" stop-opacity="0.01"/>

        </filter>
        <clipPath id="buClip"><rect x="${pL}" y="${pT}" width="${cW}" height="${cH+1}"/></clipPath>
      </defs>
      ${yTicks.map(v=>`
        <line x1="${pL}" y1="${py(v).toFixed(1)}" x2="${pL+cW}" y2="${py(v).toFixed(1)}" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>

      `).join('')}
      <path d="${areaD}" fill="url(#buGrad)" clip-path="url(#buClip)"/>
      <path d="${solidPath}" fill="none" stroke="${meta.color}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#buClip)"/>
      <line x1="${ecx.toFixed(1)}" y1="${ecy.toFixed(1)}" x2="${(pL+cW+4).toFixed(1)}" y2="${ecy.toFixed(1)}"
        stroke="${meta.color}" stroke-width="1.6" stroke-dasharray="5 5" stroke-opacity="0.35" stroke-linecap="round"/>
      ${xTicks.map(t=>`<text x="${t.x.toFixed(1)}" y="${(pT+cH+22).toFixed(1)}" text-anchor="middle" font-size="11" font-family="Inter,sans-serif" font-weight="500" fill="#C0BDB8" letter-spacing="0.02em">${t.label}</text>`).join('')}
      <circle cx="${ecx.toFixed(1)}" cy="${ecy.toFixed(1)}" r="9" fill="rgba(${meta.rgb},0.10)"/>
      <circle cx="${ecx.toFixed(1)}" cy="${ecy.toFixed(1)}" r="4.5" fill="${meta.color}" stroke="white" stroke-width="2.5" filter="url(#buGlow)"/>
      <rect id="buHoverZone" x="${pL}" y="${pT}" width="${cW}" height="${cH}" fill="transparent" style="cursor:crosshair"/>
      <g id="buTipG" style="display:none">
        <line id="buVline" x1="0" y1="${pT}" x2="0" y2="${pT+cH}" stroke="${meta.color}" stroke-width="1" stroke-dasharray="5 4" opacity="0.32"/>
        <circle id="buDot" r="5" fill="${meta.color}" stroke="white" stroke-width="2.5"/>
      </g>`

    // Position end-of-line score pill
    if (endPill && endScore) {
      endScore.textContent = data[n-1].score.toFixed(0)
      endPill.style.top = ecy + 'px'
      endPill.style.display = 'flex'
    }

    wrap._buState = { W, H, pL, pR, pT, pB, cW, cH, lo, rng, py, px, data }
  }

        <!-- Ask Ilma chat — prototype freeform-ask style -->

          <div style="padding:8px 10px 14px" id="buAskWrap">
            <div id="buAskBox" style="display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.025);border:1px solid rgba(0,0,0,0.07);border-radius:12px;padding:8px 8px 8px 12px;transition:all 0.15s">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;opacity:0.45"><path d="M8 1.5l1.3 4H14l-3.6 2.6 1.4 4.3L8 9.8l-3.8 2.6 1.4-4.3L2 5.5h4.7L8 1.5z" fill="#5B21B6"/></svg>

                onfocus="document.getElementById('buAskBox').style.background='rgba(245,243,255,0.9)';document.getElementById('buAskBox').style.borderColor='rgba(91,33,182,0.22)'"
                onblur="document.getElementById('buAskBox').style.background='rgba(0,0,0,0.025)';document.getElementById('buAskBox').style.borderColor='rgba(0,0,0,0.07)'"
                onkeydown="if(event.key==='Enter')window._buSend()"/>
              <button onclick="window._buSend()"
                id="buSendBtn"
                style="width:26px;height:26px;border-radius:8px;border:none;background:transparent;color:#C0BDB8;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:background 0.15s,color 0.15s"
                onmouseenter="this.style.background='#1E1B4B';this.style.color='#fff'"
                onmouseleave="this.style.background='transparent';this.style.color='#C0BDB8'">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 6 2 2v3.5l5 .5-5 .5V10z" fill="currentColor"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>`

    requestAnimationFrame(() => { drawChart(data); attachHover(data) })
  }

  function attachHover(data) {
    // Re-query after drawChart() has populated the SVG
    const wrap = document.getElementById('buChartWrap')
    const pill = document.getElementById('buHoverPill')
    const pillScore = document.getElementById('buPillScore')
    const pillDate  = document.getElementById('buPillDate')
    if (!wrap) return

    wrap.addEventListener('mousemove', e => {
      const st = wrap._buState; if (!st) return
      const svg  = document.getElementById('buChartSvg')
      const zone = document.getElementById('buHoverZone')
      const tipG = document.getElementById('buTipG')
      const vln  = document.getElementById('buVline')
      const dot  = document.getElementById('buDot')
      if (!svg || !zone || !tipG) return

      const rect = svg.getBoundingClientRect()
      const mx   = e.clientX - rect.left
      const frac = Math.max(0, Math.min(1, (mx - st.pL) / st.cW))
      const idx  = Math.round(frac * (st.data.length - 1))
      const pt   = st.data[idx]; if (!pt) return

      const svgX = st.px(idx)
      const svgY = st.py(pt.score)
      vln.setAttribute('x1', svgX); vln.setAttribute('x2', svgX)
      dot.setAttribute('cx', svgX); dot.setAttribute('cy', svgY)
      tipG.style.display = 'block'

      const dStr = pt.date.toLocaleDateString('en-US', { month:'short', day:'numeric' })
      pillScore.textContent = pt.score.toFixed(1)
      pillDate.textContent  = dStr
      pill.style.display = 'flex'
      requestAnimationFrame(() => {
        const pw   = pill.offsetWidth || 80
        const flip = svgX + 14 + pw > rect.width - 12
        pill.style.left = (flip ? svgX - 14 - pw : svgX + 14) + 'px'
        pill.style.top  = (svgY - 14) + 'px'
      })
    })
    wrap.addEventListener('mouseleave', () => {
      const tipG = document.getElementById('buTipG')
      if (tipG) tipG.style.display = 'none'
      if (pill) pill.style.display = 'none'
    })
  }

  // Global handlers scoped to this modal instance
  window._buWin  = k => { winKey = k; render() }
  window._buChip = i => {
    const inp = document.getElementById('buChatIn')
    if(inp){ inp.value = meta.chips[i]; window._buSend() }
  }
  window._buSend = () => {
    const inp = document.getElementById('buChatIn')
    const log = document.getElementById('buChatLog')
    if(!inp||!log) return
    const txt = inp.value.trim(); if(!txt) return
    inp.value = ''
    chatLog.push({role:'user', text:txt})
    log.innerHTML = chatHTML(); log.scrollTop = log.scrollHeight

    const chipIdx = meta.chips.findIndex(c => c.toLowerCase()===txt.toLowerCase())
    const reply   = (chipIdx>=0 && meta.answers[chipIdx])
      ? meta.answers[chipIdx]
      : `Analyzing ${slug.charAt(0).toUpperCase()+slug.slice(1)}'s data for "<i>${txt}</i>"... The most relevant signal right now is the <b>${meta.insights[0].title.toLowerCase()}</b>. Based on the current ${meta.score}% score and ${winKey} trend, this area warrants your attention. Want me to break down specific controls?`

    setTimeout(() => {
      chatLog.push({role:'assistant', text:reply})
      log.innerHTML = chatHTML(); log.scrollTop = log.scrollHeight
    }, 640)
  }

  render()
}

function openBUModal(slug, name, status, sColor, sBg, color, cardEl) {
  const modal = document.getElementById('bu-modal')
  const card  = document.getElementById('bu-modal-card')
  const scrim = document.getElementById('bu-modal-scrim')

  // Populate header
  document.getElementById('bu-modal-name').textContent = name
  document.getElementById('bu-modal-sub').textContent  = 'Business Unit  ·  Data Explorer'
  document.getElementById('bu-modal-color-bar').style.background = color
  const badge = document.getElementById('bu-modal-badge')
  badge.textContent = status
  badge.style.background = sBg
  badge.style.color = sColor

  // Target: 85% of viewport, centered
  const vw = window.innerWidth, vh = window.innerHeight
  const tw = Math.round(vw * 0.85), th = Math.round(vh * 0.85)
  const tl = Math.round((vw - tw) / 2),  tt = Math.round((vh - th) / 2)

  // Source: card bounding rect
  const src = cardEl ? cardEl.getBoundingClientRect() : { left: tl, top: tt, width: tw, height: th }

  // Scale factors (card → modal)
  const sx = src.width  / tw
  const sy = src.height / th
  const ox = (src.left + src.width  / 2) - (tl + tw / 2)
  const oy = (src.top  + src.height / 2) - (tt + th / 2)

  // Set modal position to target size
  card.style.left   = tl + 'px'
  card.style.top    = tt + 'px'
  card.style.width  = tw + 'px'
  card.style.height = th + 'px'

  // Set CSS vars for grow animation
  card.style.setProperty('--modal-ox', ox + 'px')
  card.style.setProperty('--modal-oy', oy + 'px')
  card.style.setProperty('--modal-sx', sx)
  card.style.setProperty('--modal-sy', sy)

  // Render inline BU explorer (no iframe)
  renderBUExplorer(slug)

  // Show
  modal.style.display = 'block'
  modal.style.pointerEvents = 'auto'
  requestAnimationFrame(() => {
    scrim.style.background = 'rgba(15,10,40,0.45)'
    card.style.animation = 'bu-modal-grow 0.36s cubic-bezier(0.22,1,0.36,1) forwards'
  })

  // Keyboard close
  document._buModalKeyHandler = e => { if (e.key === 'Escape') closeBUModal() }
  document.addEventListener('keydown', document._buModalKeyHandler)
}

function closeBUModal() {
  const modal = document.getElementById('bu-modal')
  const card  = document.getElementById('bu-modal-card')
  const scrim = document.getElementById('bu-modal-scrim')

  scrim.style.background = 'rgba(15,10,40,0)'
  card.style.animation = 'bu-modal-shrink 0.24s cubic-bezier(0.4,0,1,1) forwards'
  setTimeout(() => {
    modal.style.display = 'none'
    modal.style.pointerEvents = 'none'
    card.style.animation = ''
    const body = document.getElementById('bu-modal-body')
    if (body) body.innerHTML = ''
  }, 240)

  if (document._buModalKeyHandler) {
    document.removeEventListener('keydown', document._buModalKeyHandler)
    document._buModalKeyHandler = null
  }
}

let _ilmaSidebarLog = []
let _ilmaSidebarChips = []

function openIlmaSidebar(context, seedPrompt, seedReply, chips) {
  _ilmaSidebarLog = []
  _ilmaSidebarChips = chips || []

  // Switch nav to Ask Ilma if not already there
  if (activePill !== 'ilma') {

    wireNavClicks()
    // Clear badge since user is now in Ilma context
    const badge = document.getElementById('pill-ilma-badge')
    if (badge) { _ilmaAgentCount = 0; badge.style.display = 'none' }
  }

  // Set context label
  document.getElementById('ilma-sidebar-ctx').textContent = context || ''

  // Seed with opening message + Ilma reply
  if (seedPrompt) {
    _ilmaSidebarLog.push({ role: 'user', text: seedPrompt })
    if (seedReply) _ilmaSidebarLog.push({ role: 'ai', text: seedReply })
  }

  _ilmaSidebarRender()

  // Slide in
  document.getElementById('ilma-sidebar').classList.add('open')
  document.getElementById('ilma-sidebar-scrim').classList.add('open')

  // Keyboard close
  document._ilmaSidebarKey = e => { if (e.key === 'Escape') closeIlmaSidebar() }
  document.addEventListener('keydown', document._ilmaSidebarKey)

  setTimeout(() => {
    const log = document.getElementById('ilma-sidebar-log')
    if (log) log.scrollTop = log.scrollHeight
    document.getElementById('ilma-sidebar-input')?.focus()
  }, 340)
}

function closeIlmaSidebar() {
  document.getElementById('ilma-sidebar').classList.remove('open')
  document.getElementById('ilma-sidebar-scrim').classList.remove('open')
  if (document._ilmaSidebarKey) {
    document.removeEventListener('keydown', document._ilmaSidebarKey)
    document._ilmaSidebarKey = null
  }
}

function _ilmaSidebarRender() {
  const log   = document.getElementById('ilma-sidebar-log')
  const chips = document.getElementById('ilma-sidebar-chips')
  if (!log) return

  log.innerHTML = _ilmaSidebarLog.map(m => m.role === 'user'
    ? `<div class="ilma-msg-user"><div>${m.text}</div></div>`
    : `<div class="ilma-msg-ai"><div style="flex-shrink:0;margin-top:2px">${ILMA_SVG(16)}</div><div>${m.text}</div></div>`
  ).join('')

  if (chips && _ilmaSidebarChips.length) {
    chips.innerHTML = _ilmaSidebarChips.map((c,i) => `
      <button onclick="_ilmaSidebarQuickAsk(${i})"
        style="font-size:11.5px;font-family:var(--font-ui);font-weight:500;padding:5px 11px;border-radius:20px;border:1px solid rgba(124,58,237,0.18);background:rgba(245,243,255,0.85);color:#4C1D95;cursor:pointer;white-space:nowrap;transition:background 0.1s"
        onmouseenter="this.style.background='rgba(237,233,254,0.95)'"
        onmouseleave="this.style.background='rgba(245,243,255,0.85)'">${c}</button>
    `).join('')
  } else if (chips) {
    chips.innerHTML = ''
  }
}

function _ilmaSidebarQuickAsk(i) {
  const q = _ilmaSidebarChips[i]
  if (!q) return
  document.getElementById('ilma-sidebar-input').value = q
  _ilmaSidebarSend()
}

// ── Core API call — all Ilma chat goes through here ──────────────────────────
async function _ilmaApi(messages, context) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, context })
  })
  if (!res.ok) throw new Error(`API ${res.status}`)
  const data = await res.json()
  return data.content || 'Something went wrong — try again.'
}

function _ilmaShowTyping(container) {
  const el = document.createElement('div')
  el.id = 'ilma-typing'
  el.className = 'ilma-msg-ai'
  el.innerHTML = `<div style="flex-shrink:0;margin-top:2px">${ILMA_SVG(16)}</div><div style="display:flex;gap:4px;align-items:center;padding:2px 0"><span style="width:5px;height:5px;border-radius:50%;background:#C0BDB8;animation:ilma-dot 1.2s infinite 0s"></span><span style="width:5px;height:5px;border-radius:50%;background:#C0BDB8;animation:ilma-dot 1.2s infinite 0.2s"></span><span style="width:5px;height:5px;border-radius:50%;background:#C0BDB8;animation:ilma-dot 1.2s infinite 0.4s"></span></div>`
  container.appendChild(el)
  container.scrollTop = container.scrollHeight
  return el
}

function _ilmaSidebarSend() {
  const inp = document.getElementById('ilma-sidebar-input')
  const log = document.getElementById('ilma-sidebar-log')
  if (!inp || !log) return
  const txt = inp.value.trim(); if (!txt) return
  inp.value = ''
  inp.disabled = true
  _ilmaSidebarLog.push({ role: 'user', text: txt })
  _ilmaSidebarRender()
  log.scrollTop = log.scrollHeight

  const typing = _ilmaShowTyping(log)
  const ctx = document.getElementById('ilma-sidebar-ctx')?.textContent || ''

  _ilmaApi(_ilmaSidebarLog, ctx)
    .then(reply => {
      typing.remove()
      inp.disabled = false
      _ilmaSidebarLog.push({ role: 'ai', text: reply })
      _ilmaSidebarRender()
      const l = document.getElementById('ilma-sidebar-log')
      if (l) l.scrollTop = l.scrollHeight
      inp.focus()
    })
    .catch(err => {
      typing.remove()
      inp.disabled = false
      _ilmaSidebarLog.push({ role: 'ai', text: `Couldn't reach the API right now (${err.message}). Check the Vercel environment variable is set.` })
      _ilmaSidebarRender()
    })
}
