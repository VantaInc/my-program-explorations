    document.getElementById('report-toast-dl').onclick = () => {
      document.getElementById('report-toast').style.display = 'none'
    }
  }, 2200)
}

// ── Home pill — context-aware home nav ────────────────────────────────────────
function goHome() {
  activePill = null
  document.getElementById('pill-ilma').classList.remove('active')
  document.getElementById('pill-inbox').classList.remove('active')
  renderNavForCtx(currentCtx)
  renderView(CTX_META[currentCtx].homeView)
  setActive(CTX_META[currentCtx].homeView)
}

// ── Delegate to Ilma: animate row out, badge pill, inject thread ─────────────
let _ilmaAgentCount = 0
const _ilmaAgentTasks = []

function delegateToIlma(si, title, control) {
  const row = document.getElementById('sug-' + si)
  if (!row || row.dataset.delegated) return
  row.dataset.delegated = '1'

  // Animate row: fade + slide up
  row.style.transition = 'opacity 0.25s ease, transform 0.3s ease, max-height 0.35s ease, padding 0.35s ease, margin 0.35s ease'
  row.style.overflow = 'hidden'
  row.style.maxHeight = row.offsetHeight + 'px'
  row.style.opacity = '1'
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      row.style.opacity = '0'
      row.style.transform = 'translateY(-6px) scale(0.98)'
      row.style.maxHeight = '0'
      row.style.padding = '0'
      row.style.margin = '0'
    })
  })
  setTimeout(() => { row.style.display = 'none' }, 380)

  // Track task
  _ilmaAgentTasks.push({ title, control, ts: Date.now() })
  _ilmaAgentCount++

  // Bump badge on pill-ilma
  const badge = document.getElementById('pill-ilma-badge')
  if (badge) {
    badge.textContent = _ilmaAgentCount
    badge.style.display = 'inline-block'
    // Pop animation
    badge.style.transition = 'transform 0.15s ease'
    badge.style.transform = 'scale(1.4)'
    setTimeout(() => { badge.style.transform = 'scale(1)' }, 150)
  }

  // If the Ilma nav is currently open, inject a new thread row at the top
  if (activePill === 'ilma') {
    const navBody = document.getElementById('nav-body')
    const firstSection = navBody.querySelector('.nav-section')
    if (firstSection) {
      const newRow = document.createElement('button')
      newRow.className = 'nav-row'
      newRow.dataset.view = 'ilma-new'
      newRow.innerHTML = `<span class="row-icon" style="color:#7C3AED">${ILMA_SVG(13)}</span><span class="row-text">${title}</span><span class="row-meta" style="color:#7C3AED;font-weight:600">In progress</span>`
      newRow.addEventListener('click', () => { renderView('ilma-new'); setActive('ilma-new') })
      firstSection.insertBefore(newRow, firstSection.querySelector('.nav-row'))
    }
  }
}

// ── Option B: action pill handler (Ilma / Inbox) ──────────────────────────────
let activePill = null
function triggerActionPill(type) {
  const pilEl = document.getElementById('pill-' + type)
  if (activePill === type) {
    // toggle off — go back to home nav
    activePill = null
    document.getElementById('pill-ilma').classList.remove('active')
    document.getElementById('pill-inbox').classList.remove('active')
    renderNavForCtx(currentCtx)
    renderView(CTX_META[currentCtx].homeView)
    return
  }
  activePill = type
  document.getElementById('pill-ilma').classList.toggle('active', type === 'ilma')
  document.getElementById('pill-inbox').classList.toggle('active', type === 'inbox')
  const navBody = document.getElementById('nav-body')
  navBody.innerHTML = TABS[type] ? TABS[type]() : ''
  wireNavClicks()
  if (type === 'ilma') {
    renderView('ilma-health')
    // Clear badge when opening the Ilma panel (viewed = seen)
    const badge = document.getElementById('pill-ilma-badge')
    if (badge) { _ilmaAgentCount = 0; badge.style.display = 'none' }
  }
  if (type === 'inbox') renderView('inbox-stale')
}

// kept for backward compat calls; maps to pill behavior
function switchTab(tabId) {
  if (tabId === 'home') {
    activePill = null
    document.getElementById('pill-ilma').classList.remove('active')
    document.getElementById('pill-inbox').classList.remove('active')
    renderNavForCtx(currentCtx)
  } else {
    triggerActionPill(tabId)
  }
}

function wireNavClicks() {
  document.querySelectorAll('#nav-body [data-view], #nav-body [data-view]').forEach(el => {
    el.addEventListener('click', () => {
      renderView(el.dataset.view)
      setActive(el.dataset.view)
    })
  })
}

// bottom strip — no click handler needed (user chip is already wired inline)



// ─── ILMA SPOTLIGHT ──────────────────────────────────────────────────────────
;(function() {
  const overlay  = document.getElementById('ilma-spotlight')
  const input    = document.getElementById('spotlight-input')
  const suggs    = document.getElementById('spotlight-suggestions')
  const avatar   = document.getElementById('spotlight-avatar')

  // inject Ilma avatar
  avatar.innerHTML = ILMA_SVG(28)

  // Snapshot the default suggestions HTML so we can restore it
  let defaultSuggsHTML = null  // filled after init

  // Nav index — all searchable destinations
  const NAV_INDEX = [
    { text:'Forge overview',             view:'forge',          meta:'91%',       iconBg:'#EDE9FE', icon:'<svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="#7C3AED" stroke-width="1.5"><rect x="1" y="1" width="12" height="12" rx="2"/><path d="M4 7h6M4 5h6M4 9h4"/></svg>' },
    { text:'Atlas overview',             view:'atlas',          meta:'84%',       iconBg:'#FEF3C7', icon:'<svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="#D97706" stroke-width="1.5"><rect x="1" y="1" width="12" height="12" rx="2"/><path d="M4 7h6M4 5h6M4 9h4"/></svg>' },
    { text:'Orbit overview',             view:'orbit',          meta:'71%',       iconBg:'#FEE2E2', icon:'<svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="#DC2626" stroke-width="1.5"><rect x="1" y="1" width="12" height="12" rx="2"/><path d="M4 7h6M4 5h6M4 9h4"/></svg>' },
    { text:'Forge vendors',              view:'forge-vendors',  meta:'3 flagged', iconBg:'#F5F3FF', icon:'<svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="#7C3AED" stroke-width="1.5"><circle cx="7" cy="5" r="3"/><path d="M1 13c0-2.8 2.7-4.5 6-4.5s6 1.7 6 4.5"/></svg>' },
    { text:'Controls',                   view:'controls',       meta:'48 total',  iconBg:'#F5F3FF', icon:'<svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="#7C3AED" stroke-width="1.5"><rect x="1" y="1" width="5" height="5" rx="1"/><rect x="8" y="1" width="5" height="5" rx="1"/><rect x="1" y="8" width="5" height="5" rx="1"/><rect x="8" y="8" width="5" height="5" rx="1"/></svg>' },
    { text:'Audit timeline',             view:'audit-timeline', meta:'May 18',    iconBg:'#FEF3C7', icon:'<svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="#D97706" stroke-width="1.5"><path d="M7 1l6 2.5V7c0 3.5-3 5.5-6 6.5C4 12.5 1 10.5 1 7V3.5L7 1Z"/></svg>' },
    { text:'Forge team',                 view:'forge-team',     meta:'',          iconBg:'#F5F3FF', icon:'<svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="#7C3AED" stroke-width="1.5"><circle cx="7" cy="4" r="2.5"/><circle cx="3" cy="10" r="2"/><circle cx="11" cy="10" r="2"/></svg>' },
    { text:'Vendor risk · Snowflake',    view:'forge-vendors',  meta:'At risk',   iconBg:'#FEE2E2', icon:'<svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="#DC2626" stroke-width="1.5"><path d="M7 1L13 4V10L7 13L1 10V4L7 1Z"/></svg>' },
    { text:'Access management · Orbit',  view:'orbit',          meta:'55%',       iconBg:'#FEE2E2', icon:'<svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="#DC2626" stroke-width="1.5"><rect x="3" y="6" width="8" height="7" rx="1"/><path d="M5 6V4a2 2 0 014 0v2"/></svg>' },
    { text:'Control pass rates chart',   view:'ilma-viz',       meta:'Chart',     iconBg:'#F5F3FF', icon:'<svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="#7C3AED" stroke-width="1.5"><rect x="1" y="6" width="3" height="7"/><rect x="5.5" y="3" width="3" height="10"/><rect x="10" y="1" width="3" height="12"/></svg>' },
    { text:'Ilma · Program health',      view:'ilma-health',    meta:'2h ago',    iconBg:'#F5F3FF', icon:'' },
    { text:'Inbox · Stale accounts',     view:'inbox-stale',    meta:'Critical',  iconBg:'#FEE2E2', icon:'<svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="#DC2626" stroke-width="1.5"><path d="M2 3h10l-1 6H3L2 3Z"/><path d="M2 3L1 1H0"/><circle cx="4.5" cy="12" r="1"/><circle cx="9.5" cy="12" r="1"/></svg>' },
    { text:'Vendor · BAA · questionnaire',view:'forge-vendors', meta:'',          iconBg:'#F5F3FF', icon:'' },
    { text:'IdP sync failure Okta',      view:'orbit',          meta:'',          iconBg:'#FEE2E2', icon:'' },
  ]

  let focusIdx = -1

  function getRows() { return [...suggs.querySelectorAll('.spotlight-row')] }

  function setFocus(idx) {
    const rows = getRows()
    rows.forEach((r,i) => r.classList.toggle('focused', i === idx))
    focusIdx = idx
  }

  function renderDynamic(q) {
    if (!q) { suggs.innerHTML = defaultSuggsHTML; focusIdx = -1; return }
    const lq = q.toLowerCase()
    const matches = NAV_INDEX.filter(n => n.text.toLowerCase().includes(lq)).slice(0, 5)

    const searchRow = `
      <button class="spotlight-row" data-spotlight-view="search-results" data-search-query="${q.replace(/"/g,'&quot;')}">
        <div class="spotlight-row-icon" style="background:#F5F3FF">${ILMA_SVG(13)}</div>
        <span class="spotlight-row-text">Search — <em style="color:#7C3AED;font-style:normal">${q}</em></span>
        <span class="spotlight-row-meta" style="color:#7C3AED;font-weight:600">AI Overview ↵</span>
      </button>`

    const matchRows = matches.map(n => `
      <button class="spotlight-row" data-spotlight-view="${n.view}">
        <div class="spotlight-row-icon" style="background:${n.iconBg}">${n.icon || ILMA_SVG(13)}</div>
        <span class="spotlight-row-text">${n.text}</span>
        <span class="spotlight-row-meta">${n.meta}</span>
      </button>`).join('')

    suggs.innerHTML = `
      <div class="spotlight-section-label">Ask Ilma</div>
      ${searchRow}
      ${matches.length ? `<div class="spotlight-section-label" style="margin-top:4px">Jump to</div>${matchRows}` : ''}`
    focusIdx = -1
  }

  function openSpotlight() {
    overlay.classList.add('open')
    input.value = ''
    focusIdx = -1
    suggs.innerHTML = defaultSuggsHTML
    setTimeout(() => input.focus(), 40)
  }

  function closeSpotlight() {
    overlay.classList.remove('open')
    input.value = ''
  }

  function activateRow(row) {
    const view = row.dataset.spotlightView || 'search-results'
    const query = row.dataset.searchQuery || input.value.trim()
    if (query) _lastSearchQuery = query
    closeSpotlight()
    // Nav toggle
    if (view !== 'forge' && view !== 'atlas' && view !== 'orbit' && view !== 'controls' && view !== 'audit-timeline') {
      if (activePill !== 'ilma') {
        activePill = 'ilma'
        document.getElementById('pill-ilma').classList.add('active')
        document.getElementById('pill-inbox').classList.remove('active')
        const navBody = document.getElementById('nav-body')
        navBody.innerHTML = TABS['ilma'] ? TABS['ilma']() : ''
        wireNavClicks()
      }
    }
    renderView(view)
    setActive(view)
    const prompt = row.dataset.prompt
    if (prompt) {
      setTimeout(() => {
        const ci = document.getElementById('chat-input')
        if (ci) { ci.value = prompt; ci.focus() }
      }, 60)
    }
  }

  function submitSearch() {
    const q = input.value.trim()
    if (!q) return
    _lastSearchQuery = q
    closeSpotlight()
    if (activePill !== 'ilma') {
      activePill = 'ilma'
      document.getElementById('pill-ilma').classList.add('active')
      document.getElementById('pill-inbox').classList.remove('active')
      document.getElementById('nav-body').innerHTML = TABS['ilma'] ? TABS['ilma']() : ''
      wireNavClicks()
    }
    renderView('search-results')
    setActive('search-results')
  }

  // keyboard nav
  document.addEventListener('keydown', e => {
    // open with Cmd/Ctrl+K or Cmd/Ctrl+I
    if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'i')) {
      e.preventDefault()
      if (overlay.classList.contains('open')) closeSpotlight()
      else openSpotlight()
      return
    }
    if (!overlay.classList.contains('open')) return
    if (e.key === 'Escape') { e.preventDefault(); closeSpotlight(); return }
    const rows = getRows()
    if (e.key === 'ArrowDown') {
      e.preventDefault(); setFocus(Math.min(focusIdx + 1, rows.length - 1))
    } else if (e.key === 'ArrowUp') {
      e.preventDefault(); setFocus(Math.max(focusIdx - 1, -1))
    } else if (e.key === 'Enter') {
      e.preventDefault()
      if (focusIdx >= 0 && rows[focusIdx]) {
        activateRow(rows[focusIdx])
      } else {
        // typed but no selection → submit as search
        const q = input.value.trim()
        if (q) submitSearch()
        else if (rows[0]) activateRow(rows[0])
      }
    }
  })

  // input: live filter
  input.addEventListener('input', () => renderDynamic(input.value.trim()))

  // click outside to close
  overlay.addEventListener('click', e => {
    if (!document.getElementById('spotlight-box').contains(e.target)) closeSpotlight()
  })

  // row clicks
  suggs.addEventListener('click', e => {
    const row = e.target.closest('.spotlight-row')
    if (row) activateRow(row)
  })

  // Capture default HTML after icons are injected (deferred)
  setTimeout(() => { defaultSuggsHTML = suggs.innerHTML }, 100)
})()

})

renderNavForCtx(currentCtx)
renderView('home-page')
