<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanta — Nav</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    font-size: 14px; color: #1A1A1A; background: #F7F6F3;
    height: 100vh; overflow: hidden; display: flex;
  }

  /* ─── SIDEBAR ─── */
  #sidebar {
    width: 260px; flex-shrink: 0; background: #fff;
    border-right: 1px solid rgba(0,0,0,0.07);
    display: flex; flex-direction: column; height: 100vh;
    user-select: none; overflow: hidden;
  }

  /* workspace header */
  .ws-header {
    padding: 11px 12px 8px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .ws-left { display: flex; align-items: center; gap: 7px; }
  .ws-logo {
    width: 22px; height: 22px; border-radius: 5px; background: #5B21B6;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .ws-name { font-size: 14px; font-weight: 600; color: #1A1A1A; }

  /* tab bar */
  .tab-bar {
    padding: 0 8px 8px; display: flex; gap: 2px; flex-shrink: 0;
  }
  .tab-btn {
    display: flex; align-items: center; justify-content: center; gap: 5px;
    padding: 5px 8px; border: none; border-radius: 7px;
    background: transparent; cursor: pointer; color: #9CA3AF;
    transition: background 0.12s, color 0.12s; white-space: nowrap;
    font-size: 13px; font-weight: 400; font-family: inherit; flex-shrink: 0;
  }
  .tab-btn:hover { background: rgba(0,0,0,0.05); color: #374151; }
  .tab-btn.active { background: rgba(0,0,0,0.06); color: #1A1A1A; font-weight: 500; }
  .tab-label { font-size: 13px; }

  /* nav body */
  .nav-body {
    flex: 1; overflow-y: auto; padding: 4px 8px 4px;
    min-height: 0;
  }
  .nav-body::-webkit-scrollbar { width: 3px; }
  .nav-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 2px; }

  .nav-section { margin-bottom: 2px; }
  .sec-label {
    font-size: 11px; font-weight: 600;
    color: rgba(55,65,81,0.4); letter-spacing: 0.055em;
    padding: 8px 8px 3px; display: block;
  }
  .nav-row {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 8px; border-radius: 6px; border: none;
    background: transparent; cursor: pointer;
    font-size: 13px; color: #3D3D3D;
    width: 100%; text-align: left; transition: background 0.1s;
    font-family: inherit;
  }
  .nav-row:hover { background: rgba(0,0,0,0.05); }
  .nav-row.active { background: rgba(91,33,182,0.07); color: #5B21B6; }
  .row-icon {
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; color: #9CA3AF;
  }
  .nav-row.active .row-icon { color: #7C3AED; }
  .row-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-meta { font-size: 11px; color: #9CA3AF; flex-shrink: 0; }
  .prog-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* agent card */
  .agent-card {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 8px; border-radius: 8px; margin-bottom: 4px;
    background: #F7F3FF; border: 1px solid rgba(109,40,217,0.1);
    cursor: pointer; transition: background 0.1s;
  }
  .agent-card:hover { background: #EDE9FE; }
  .agent-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: transparent;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    overflow: hidden;
  }
  .agent-name { font-size: 13px; font-weight: 500; color: #1A1A1A; }
  .agent-desc { font-size: 11px; color: #6B7280; margin-top: 1px; }

  /* inbox items */
  .inbox-item {
    display: flex; align-items: flex-start; gap: 9px;
    padding: 7px 8px; border-radius: 6px; cursor: pointer;
    transition: background 0.1s; border: none; background: transparent;
    width: 100%; text-align: left; font-family: inherit;
  }
  .inbox-item:hover { background: rgba(0,0,0,0.04); }
  .inbox-item.active { background: rgba(91,33,182,0.07); }
  .inbox-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .inbox-title { font-size: 13px; color: #1A1A1A; line-height: 1.4; }
  .inbox-sub { font-size: 11px; color: #9CA3AF; margin-top: 1px; }

  /* search */
  .search-input-wrap {
    display: flex; align-items: center; gap: 7px;
    background: rgba(0,0,0,0.04); border-radius: 7px;
    padding: 7px 10px; margin-bottom: 8px;
    border: 1px solid rgba(0,0,0,0.07);
  }
  .search-input-wrap input {
    border: none; background: transparent; font-size: 13px;
    color: #1A1A1A; outline: none; flex: 1; font-family: inherit;
  }
  .search-input-wrap input::placeholder { color: #9CA3AF; }

  /* ─── BOTTOM NAV ─── */
  .bottom-nav {
    padding: 6px 8px 4px; border-top: 1px solid rgba(0,0,0,0.05);
    display: flex; flex-direction: row; gap: 2px; flex-shrink: 0;
  }
  .bn-item {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 7px 4px; border-radius: 6px; border: none; min-width: 0;
    background: transparent; cursor: pointer;
    color: #9CA3AF; font-family: inherit;
    transition: background 0.1s, color 0.1s, flex 0.18s ease;
  }
  .bn-item:hover { background: rgba(0,0,0,0.05); color: #374151; flex: 4; }
  .bn-item.active { background: rgba(91,33,182,0.07); color: #5B21B6; flex: 4; }
  .bn-item.active .bn-icon { color: #7C3AED; }
  .bn-icon { display: flex; align-items: center; justify-content: center; width: 16px; height: 16px; flex-shrink: 0; }
  .bn-label {
    font-size: 12px; font-weight: 500; white-space: nowrap;
    max-width: 0; opacity: 0; overflow: hidden; margin-left: 0;
    transition: max-width 0.2s ease, opacity 0.15s ease, margin-left 0.15s ease;
  }
  .bn-item:hover .bn-label, .bn-item.active .bn-label {
    max-width: 100px; opacity: 1; margin-left: 5px;
  }


  /* ─── CONTENT AREA ─── */
  #content { flex: 1; overflow-y: auto; background: #F7F6F3; }
  #content::-webkit-scrollbar { width: 5px; }
  #content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

  .page { padding: 36px 44px; max-width: 860px; animation: fadein 0.15s ease; }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* page header */
  .page-header { margin-bottom: 28px; }
  .page-breadcrumb { font-size: 11px; color: #9CA3AF; margin-bottom: 7px; letter-spacing: 0.02em; }
  .page-heading { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .page-title-block { }
  .page-title { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 3px; }
  .page-sub { font-size: 13px; color: #6B7280; }
  .page-actions { display: flex; gap: 8px; flex-shrink: 0; margin-top: 2px; }
  .btn {
    padding: 6px 13px; border-radius: 7px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid #E5E7EB; background: #fff;
    color: #374151; font-family: inherit; transition: all 0.12s;
  }
  .btn:hover { background: #F9FAFB; }
  .btn.primary { background: #5B21B6; color: #fff; border-color: transparent; }
  .btn.primary:hover { background: #4C1D95; }

  /* stat cards */
  .stats-row { display: flex; gap: 12px; margin-bottom: 24px; }
  .stat-card {
    flex: 1; background: #fff; border: 1px solid #E9E9E7;
    border-radius: 10px; padding: 14px 16px;
  }
  .stat-value { font-size: 22px; font-weight: 700; color: #111827; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: #6B7280; }
  .stat-trend { font-size: 11px; margin-top: 2px; }

  /* health ring */
  .health-header {
    display: flex; align-items: center; gap: 20px; margin-bottom: 24px;
    background: #fff; border: 1px solid #E9E9E7; border-radius: 12px; padding: 20px 24px;
  }
  .health-ring { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
  .health-ring svg { transform: rotate(-90deg); }
  .health-ring-num {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: 17px; font-weight: 700;
  }
  .health-meta { }
  .health-program-name { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 4px; }
  .health-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px;
  }
  .badge.framework { background: #EDE9FE; color: #5B21B6; }
  .badge.status-ok { background: #D1FAE5; color: #065F46; }
  .badge.status-warn { background: #FEF3C7; color: #92400E; }
  .badge.status-risk { background: #FEE2E2; color: #991B1B; }

  /* themes */
  .section-card {
    background: #fff; border: 1px solid #E9E9E7;
    border-radius: 10px; overflow: hidden; margin-bottom: 16px;
  }
  .section-card-header {
    padding: 13px 16px; border-bottom: 1px solid #F3F3F1;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-card-title { font-size: 13px; font-weight: 600; color: #374151; }
  .section-card-body { padding: 4px 0; }

  .theme-row {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 16px; border-bottom: 1px solid #F7F6F3;
    cursor: pointer; transition: background 0.1s;
  }
  .theme-row:last-child { border-bottom: none; }
  .theme-row:hover { background: #FAFAF9; }
  .theme-name { font-size: 13px; color: #1A1A1A; width: 180px; flex-shrink: 0; }
  .theme-bar-wrap { flex: 1; }
  .theme-bar { height: 5px; background: #F3F3F1; border-radius: 3px; overflow: hidden; }
  .theme-fill { height: 100%; border-radius: 3px; }
  .theme-count { font-size: 11px; color: #9CA3AF; width: 60px; text-align: right; flex-shrink: 0; }
  .status-pill {
    font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
    flex-shrink: 0; white-space: nowrap;
  }
  .pill-pass { background: #D1FAE5; color: #065F46; }
  .pill-warn { background: #FEF3C7; color: #92400E; }
  .pill-risk { background: #FEE2E2; color: #991B1B; }
  .pill-review { background: #E0E7FF; color: #3730A3; }

  /* table */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    font-size: 11px; font-weight: 600; color: #9CA3AF; text-align: left;
    padding: 10px 16px; border-bottom: 1px solid #E9E9E7; letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .data-table td {
    font-size: 13px; color: #374151; padding: 10px 16px;
    border-bottom: 1px solid #F3F3F1;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: #FAFAF9; }
  .td-name { font-weight: 500; color: #111827; }
  .td-light { color: #9CA3AF; font-size: 12px; }

  /* two-col */
  .two-col { display: flex; gap: 16px; margin-bottom: 16px; }
  .two-col .col { flex: 1; min-width: 0; }
  .two-col .col-narrow { width: 300px; flex-shrink: 0; }

  /* activity */
  .activity-item {
    display: flex; gap: 10px; padding: 9px 16px;
    border-bottom: 1px solid #F3F3F1;
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
  }
  .activity-text { font-size: 13px; color: #374151; line-height: 1.45; }
  .activity-time { font-size: 11px; color: #9CA3AF; margin-top: 2px; }

  /* checklist */
  .check-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px; border-bottom: 1px solid #F3F3F1; cursor: pointer;
  }
  .check-item:last-child { border-bottom: none; }
  .check-item:hover { background: #FAFAF9; }
  .check-box {
    width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0;
    border: 1.5px solid #D1D5DB; display: flex; align-items: center; justify-content: center;
  }
  .check-box.checked { background: #059669; border-color: #059669; }
  .check-label { font-size: 13px; color: #374151; flex: 1; }
  .check-label.done { text-decoration: line-through; color: #9CA3AF; }
  .check-meta { font-size: 11px; color: #9CA3AF; }

  /* ilma chat */
  .chat-wrap { background: #fff; border: 1px solid #E9E9E7; border-radius: 12px; overflow: hidden; }
  .chat-header { padding: 14px 20px; border-bottom: 1px solid #F3F3F1; display: flex; align-items: center; gap: 10px; }
  .chat-avatar { width: 30px; height: 30px; border-radius: 50%; background: transparent; display:flex;align-items:center;justify-content:center;flex-shrink:0; overflow: hidden; }
  .chat-name { font-size: 14px; font-weight: 600; }
  .chat-status { font-size: 11px; color: #059669; margin-top: 1px; }
  .chat-messages { padding: 20px; display: flex; flex-direction: column; gap: 14px; min-height: 260px; max-height: 340px; overflow-y: auto; }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .msg-ai { background: #F5F3FF; border-radius: 10px 10px 10px 2px; padding: 10px 14px; font-size: 13px; color: #374151; line-height: 1.55; max-width: 82%; }
  .msg-user { background: #F3F4F6; border-radius: 10px 10px 2px 10px; padding: 10px 14px; font-size: 13px; color: #374151; line-height: 1.55; max-width: 75%; align-self: flex-end; }
  .chat-input-wrap { padding: 12px 16px; border-top: 1px solid #F3F3F1; display: flex; gap: 8px; }
  .chat-input-wrap input { flex: 1; padding: 8px 12px; border: 1px solid #E5E7EB; border-radius: 8px; font-size: 13px; outline: none; background: #F9FAFB; font-family: inherit; }
  .chat-input-wrap input:focus { border-color: rgba(109,40,217,0.4); background: #fff; }
  .chat-send { padding: 8px 13px; background: #5B21B6; color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }

  /* vendor card grid */
  .vendor-grid { display: flex; flex-direction: column; gap: 0; }
  .vendor-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid #F3F3F1; cursor: pointer; }
  .vendor-row:last-child { border-bottom: none; }
  .vendor-row:hover { background: #FAFAF9; }
  .vendor-logo { width: 28px; height: 28px; border-radius: 6px; background: #F3F4F6; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #374151; flex-shrink: 0; }
  .vendor-name { font-size: 13px; font-weight: 500; color: #111827; flex: 1; }
  .vendor-type { font-size: 12px; color: #9CA3AF; width: 120px; flex-shrink: 0; }
  .vendor-due { font-size: 12px; color: #9CA3AF; width: 80px; text-align: right; flex-shrink: 0; }

  /* empty state */
  .view-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: #9CA3AF; gap: 10px; }
  .view-empty svg { opacity: 0.3; }
  .view-empty p { font-size: 14px; }

  /* ─── ILMA SPOTLIGHT ─── */
  #ilma-spotlight {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
    align-items: flex-start; justify-content: center;
    padding-top: 18vh;
    animation: spotlight-bg-in 0.15s ease;
  }
  #ilma-spotlight.open { display: flex; }
  @keyframes spotlight-bg-in {
    from { opacity: 0; } to { opacity: 1; }
  }
  .spotlight-box {
    width: 560px; max-width: calc(100vw - 32px);
    background: #fff; border-radius: 16px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.08);
    overflow: hidden;
    animation: spotlight-box-in 0.18s cubic-bezier(0.34,1.3,0.64,1);
  }
  @keyframes spotlight-box-in {
    from { opacity: 0; transform: scale(0.94) translateY(-12px); }
    to   { opacity: 1; transform: scale(1)    translateY(0); }
  }
  .spotlight-input-row {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px 14px 14px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .spotlight-avatar {
    width: 28px; height: 28px; flex-shrink: 0;
    border-radius: 50%; overflow: hidden;
  }
  #spotlight-input {
    flex: 1; border: none; outline: none; font-size: 16px;
    color: #111827; background: transparent; font-family: inherit;
    font-weight: 400;
  }
  #spotlight-input::placeholder { color: #C0BDB8; }
  .spotlight-kbd {
    font-size: 11px; color: #C0BDB8; flex-shrink: 0;
    background: #F3F4F6; border-radius: 4px; padding: 2px 6px;
    font-family: inherit; letter-spacing: 0.02em;
  }
  .spotlight-suggestions {
    padding: 6px 0 8px;
  }
  .spotlight-section-label {
    font-size: 10px; font-weight: 700; color: #C0BDB8;
    letter-spacing: 0.07em; text-transform: uppercase;
    padding: 8px 16px 4px;
  }
  .spotlight-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; cursor: pointer; transition: background 0.08s;
    border: none; background: transparent; width: 100%; text-align: left;
    font-family: inherit;
  }
  .spotlight-row:hover, .spotlight-row.focused {
    background: rgba(109,40,217,0.06);
  }
  .spotlight-row-icon {
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 13px;
  }
  .spotlight-row-text { font-size: 13px; color: #1A1A1A; flex: 1; }
  .spotlight-row-meta { font-size: 11px; color: #C0BDB8; flex-shrink: 0; }
  .spotlight-footer {
    padding: 8px 16px; border-top: 1px solid rgba(0,0,0,0.05);
    display: flex; align-items: center; gap: 16px;
  }
  .spotlight-hint {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: #C0BDB8;
  }
  .spotlight-hint kbd {
    background: #F3F4F6; border-radius: 3px; padding: 1px 5px;
    font-size: 10px; font-family: inherit;
  }
</style>
</head>
<body>

<!-- ─── ILMA SPOTLIGHT OVERLAY ─── -->
<div id="ilma-spotlight" role="dialog" aria-modal="true">
  <div class="spotlight-box" id="spotlight-box">
    <div class="spotlight-input-row">
      <div class="spotlight-avatar" id="spotlight-avatar"></div>
      <input id="spotlight-input" type="text" placeholder="Ask anything…" autocomplete="off" spellcheck="false" />
      <span class="spotlight-kbd">esc</span>
    </div>
    <div class="spotlight-suggestions" id="spotlight-suggestions">
      <div class="spotlight-section-label">Suggested</div>
      <button class="spotlight-row" data-spotlight-view="ilma-new" data-prompt="What's my highest priority right now?">
        <div class="spotlight-row-icon" style="background:#F5F3FF">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="#7C3AED"><path d="M8 1.5L9.2 5.8H13.5L10 8.3L11.2 12.5L8 10L4.8 12.5L6 8.3L2.5 5.8H6.8L8 1.5Z"/></svg>
        </div>
        <span class="spotlight-row-text">What's my highest priority right now?</span>
        <span class="spotlight-row-meta">Ask Ilma</span>
      </button>
      <button class="spotlight-row" data-spotlight-view="ilma-new" data-prompt="Summarize Forge audit readiness">
        <div class="spotlight-row-icon" style="background:#F5F3FF">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="#7C3AED"><path d="M8 1.5L9.2 5.8H13.5L10 8.3L11.2 12.5L8 10L4.8 12.5L6 8.3L2.5 5.8H6.8L8 1.5Z"/></svg>
        </div>
        <span class="spotlight-row-text">Summarize Forge audit readiness</span>
        <span class="spotlight-row-meta">Ask Ilma</span>
      </button>
      <button class="spotlight-row" data-spotlight-view="ilma-new" data-prompt="What's blocking Atlas from 90%?">
        <div class="spotlight-row-icon" style="background:#F5F3FF">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="#7C3AED"><path d="M8 1.5L9.2 5.8H13.5L10 8.3L11.2 12.5L8 10L4.8 12.5L6 8.3L2.5 5.8H6.8L8 1.5Z"/></svg>
        </div>
        <span class="spotlight-row-text">What's blocking Atlas from 90%?</span>
        <span class="spotlight-row-meta">Ask Ilma</span>
      </button>
      <div class="spotlight-section-label" style="margin-top:4px">Jump to</div>
      <button class="spotlight-row" data-spotlight-view="forge">
        <div class="spotlight-row-icon" style="background:#F0FDF4">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="#059669" stroke-width="1.5"><path d="M8 2L14 4.5V8C14 11.5 11 13.5 8 14.5C5 13.5 2 11.5 2 8V4.5L8 2Z"/></svg>

function renderView(id) {
  const content = document.getElementById('content')
  const view = VIEWS[id] || VIEWS['home-page']
  content.innerHTML = view()
  // wire up ilma chat if present
  const sendBtn = document.getElementById('chat-send')
  const chatInput = document.getElementById('chat-input')
  if (sendBtn && chatInput) {
    const send = () => {
      const msg = chatInput.value.trim()
      if (!msg) return
      const msgs = document.getElementById('chat-msgs')
      msgs.innerHTML += `<div class="msg-user">${msg}</div>`
      chatInput.value = ''
      msgs.scrollTop = msgs.scrollHeight
      setTimeout(() => {
        msgs.innerHTML += `<div class="msg-ai">On it. Let me pull up the relevant context for you...</div>`
        msgs.scrollTop = msgs.scrollHeight
      }, 800)
    }
    sendBtn.addEventListener('click', send)
    chatInput.addEventListener('keydown', e => { if (e.key==='Enter') send() })
  }
  // content area: all data-view elements (program chips, recent cards, rec buttons, table rows)
  document.querySelectorAll('#content [data-view]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation()
      renderView(el.dataset.view)
      setActive(el.dataset.view)
    })
  })
}

  document.querySelectorAll('.nav-row, .inbox-item').forEach(el => el.classList.remove('active'))

  const match = document.querySelector(`[data-view="${id}"]`)
  if (match) match.classList.add('active')
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const active = btn.dataset.tab === tabId
    btn.classList.toggle('active', active)

    const lbl = btn.querySelector('.tab-label')
    const labelText = btn.dataset.tab === 'ilma' ? 'Ask Ilma' : TAB_LABELS[btn.dataset.tab]
    if (active && !lbl) {
      const s = document.createElement('span'); s.className = 'tab-label'; s.textContent = labelText; btn.appendChild(s)
    } else if (active && lbl) {
      lbl.textContent = labelText
    } else if (!active && lbl) {
      lbl.remove()
    }
  })
  document.getElementById('nav-body').innerHTML = TABS[tabId]()
  wireNavClicks()
}

function wireNavClicks() {
  document.querySelectorAll('#nav-body [data-view], #nav-body [data-view]').forEach(el => {
    el.addEventListener('click', () => {
      renderView(el.dataset.view)
      setActive(el.dataset.view)

  })
}

// ─── ILMA SPOTLIGHT ──────────────────────────────────────────────────────────
;(function() {
  const overlay  = document.getElementById('ilma-spotlight')
  const input    = document.getElementById('spotlight-input')
  const suggs    = document.getElementById('spotlight-suggestions')
  const avatar   = document.getElementById('spotlight-avatar')

  // inject llama avatar
  avatar.innerHTML = ILMA_SVG(28)

  let focusIdx = -1

  function getRows() { return [...suggs.querySelectorAll('.spotlight-row')] }

  function setFocus(idx) {
    const rows = getRows()
    rows.forEach((r,i) => r.classList.toggle('focused', i === idx))
    focusIdx = idx
  }

  function openSpotlight() {
    overlay.classList.add('open')
    input.value = ''
    focusIdx = -1
    setFocus(-1)
    setTimeout(() => input.focus(), 40)
  }

  function closeSpotlight() {
    overlay.classList.remove('open')
    input.value = ''
  }

  function activateRow(row) {
    closeSpotlight()
    const view = row.dataset.spotlightView || 'ilma-new'
    const prompt = row.dataset.prompt
    renderView(view)
    // if there's a prompt and a chat input, pre-fill it
    if (prompt) {
      setTimeout(() => {
        const ci = document.getElementById('chat-input')
        if (ci) { ci.value = prompt; ci.focus() }
      }, 60)
    }
  }

  // keyboard nav
  document.addEventListener('keydown', e => {
    // open
    if ((e.metaKey || e.ctrlKey) && e.key === 'i') {
      e.preventDefault()
      if (overlay.classList.contains('open')) closeSpotlight()
      else openSpotlight()
      return
    }
    if (!overlay.classList.contains('open')) return
    if (e.key === 'Escape') { e.preventDefault(); closeSpotlight(); return }
    const rows = getRows()
    if (e.key === 'ArrowDown') {
      e.preventDefault(); setFocus(Math.min(focusIdx + 1, rows.length - 1))
    } else if (e.key === 'ArrowUp') {
      e.preventDefault(); setFocus(Math.max(focusIdx - 1, -1))
    } else if (e.key === 'Enter') {
      e.preventDefault()
      const row = focusIdx >= 0 ? rows[focusIdx] : rows[0]
      if (row) activateRow(row)
    }
  })

  // click outside to close
  overlay.addEventListener('click', e => {
    if (!document.getElementById('spotlight-box').contains(e.target)) closeSpotlight()
  })

  // row clicks
  suggs.addEventListener('click', e => {
    const row = e.target.closest('.spotlight-row')
    if (row) activateRow(row)
  })
})()
